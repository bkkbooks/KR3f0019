body:
  text: 月離數理月離總論太陰本天面積随時不同太陰本天心距地及最高行隨時不同求初均數求一平均求二平均求三平均求二均數求三均末均求交均及黄白大距地半徑差月離總論古歴皆謂月一日行十三度十九分度之七出入日道不踰六度東漢賈逵始言月行有遲疾至劉洪列為差率元郭守敬乃定為轉分進退時各不同猶今之初均數而其出入日道之大距則仍恒為六度也新法算書初均而外又有二均三均交均葢因朔望之行有遲疾故有初均兩弦又不同於朔望故有二均兩弦前後又不同於兩弦故有三均此經度之差也朔望交行遲而大距近兩弦交行疾而大距逺故有交均此交行之差而亦緯度之差也上編言太陰行度有九種一曰平行二曰自行三曰均輪行四曰次輪行五曰次均輪行六曰交行七曰最高行八曰距日行九曰距交行其實均輪行自行度次輪次均輪皆行月距日倍度則九種行度之中又止六種而巳自西人刻白爾創為撱圓之法専主不同心天而不同心天之兩心差及太陰諸行又皆以日行與日天為消息故日行有盈縮則太陰平行最高行正交行皆因之而差名曰一平均日距月天最高有逺近則太陰本天心有進退兩心差有大小而平行面積亦因之而差名曰二平均其最高之差名曰最高均又白極繞黄極而轉移則白道度有進退而太陰之在白道亦因之而差名曰三平均此四者皆昔日之所無而刻白爾以来柰端等屢測而創獲者也夫兩心差既有大小則月距最高雖等而遲疾之差不等故分大中小三數而仍名曰初均朔望而外其差之最大者不在兩弦而在朔弦弦望之間仍名曰二均又月高距日高與月距日之共度半周内恒差而疾半周外恒差而遲仍名曰三均又朔後恒差而遲望後恒差而疾因月高距日高之逺近其差不等别名曰末均又日在交後一象限則交行疾日在交前一象限則交行遲仍名曰正交均此五者末均為昔日之所無其餘諸均亦名同而數異皆刻白爾以来噶西尼等屢測而改定者也至於黄白交角即大距度新法算書朔望最小兩弦最大今則謂日在交㸃交角大前後皆小朔望尤小日在大距交角小前後皆大兩弦尤大似皆與新法算書不同然用以推歩交食則皆與實測合而與新法算書亦相去不逺計其行度一平均用日引度二平均最高均用日距月最高之倍度三平均正交均用日距正交之倍度初均仍用自行度二均仍用月距日倍度三均末均用月距日兼月高距日高度交角用日距正交兼月距日度較舊用行度多四種一曰日引二曰日距月最高三曰日距正交四曰月高距日高則其行度共行種矣今考其表中所列誠皆實測之數而要不離乎本天高卑中距四限與朔望兩弦前後參互比較而得之兹為總舉其端而各具測算之法於後庶學者知其立法所自来而推歩考驗咸可通其條貫云太陰本天面積隨時不同太陰初均數生於兩心差兩心差不等則均數亦不等然於平行無與也自刻白爾以本天為撱圓以平行為面積則兩心差不等而撱圓之面積與太陰之平行亦因之不等盖兩心差大者小徑之數小而面積亦小兩心差小者小徑之數大而面積亦大故分撱圓之度數雖同而度之面積各異非先求其面積無以求度數也今取兩心差之大中小三數求其小徑及面積以定平行而後均數可得而推也如圖甲為地心乙為本天心甲乙為兩心差甲丙為倍差丁戊己庚撱圓為太陰本天乙丁為大半徑一千萬乙戊為小半徑甲戊丙戊皆與乙丁大半徑等以甲戊為弦甲乙為勾求得股即乙戊小半徑也以乙丁大半徑求得丁辛己壬平圓積以乙辛與乙戊為比例即撱圓全積也用度分秒數除之即得一度一分一秒之積也以庚戊小徑與丁己大徑相乗開平方折半即乙癸中率半徑也其理皆與日躔同惟兩心差隨時不同則小徑與面積皆各異具列於左最大兩心差六六七八二小徑九九七七六七五小餘九中率半徑九九八八八三一小餘七二中率半徑方九九七七六七五九四一一七二撱圓全積三一三四五七九三二八四四五六七九十度積七八三六四四八三二一一一四二一度積八七七一六四八一二四一分積一四五一一九四一三三五一秒積二四一八六五六八九中數兩心差五五五五小徑九九八四八三五小餘七一中率半徑九九九二四一四小餘九八中率半徑方九九八四八三五七一四四七一撱圓全積三一三六八二八六四九二三九六九十度積七八四二七一六二三九九一度積八七一三四一二九一四四六一分積一四五二二三五四八五七一秒積二四二三九二四八最小兩心差四三三一九小徑九九九六一二小餘九二中率半徑九九九五三五小餘三六中率半徑方九九九六一二九一五三二七一撱圓全積三一三八六四三六一三七八六七九十度積七八四六六九二五九四六七一度積八七一八四五四四七三二七一分積一四五三七五七四五五一秒積二四二一七九二九一太陰本天心距地及最高行隨時不同太陰之行有遲疾由于本天有高卑其説一為不同心天一為本輪與太陽同西人第谷以前定本輪半徑為本天半徑千萬分之八十七萬即不同心天之兩心差其最大遲疾差為四度五十八分二十七秒第谷用其法惟中距與實測合最高前後則失之小最卑前後則失之大因将本輪半徑三分之存其二分五十四萬為本輪半徑取其一分二十七萬為均輪半徑其高卑之數遲疾之差雖各有不同而其距地之有定數最高之有常行則一也自刻白爾創為撱圓之法専主不同心天而不同心天之兩心差及最高行又隨時不同惟日當月天中距時最大遲疾差為四度五十七分五十七秒兩心差為四三三一九倍差即為八十六萬有竒與舊數相去不逺若日當月天最高或當月天最卑則最大遲疾差為七度三十九分三十三秒兩心差為六六七八二日厯月天高卑而後兩心差漸小中距而後兩心差漸大日距月天高卑前後四十五度兩心差適中又日當月天高卑時最高之行常速至高卑後四十五度而止日當月天中距時最高之行常遲至中距後四十五度而止與日月之盈縮遲疾相似而周轉之數倍之是則太陰本天之心必更有一均輪以消息乎兩心差及最高行之數因以地心為心以兩心差最大最小兩數相加折半得五五五五為最高本輪半徑相減折半得一一七三一五為最高均輪半徑均輪心循本輪周右旋行最高平行度本天心循均輪周右旋行日距月最高之倍度用切線分外角法求得地心之角為最高均數即最高行之差求得兩心相距之邊為本天心距地數即本時之兩心差也今考其表中所載其最大遲疾差不在中距最高前後九十度多最卑前後九十度少與上編小輪之理同其求兩心差則在本天高卑之適中而亦不正九十度與本編日躔之理同而其測量諸均數則必在高卑中距或高卑中距之間其數乃整齊而易辨要之測得高卑中距之差則兩心差之數巳見而求得兩心差之數則高卑中距之差悉合矣如甲為地心乙為太陰本天心丙為最高丁為最卑戊己為中距戊己乃實行之中距非平行之中距因朔望相對故借實行以明之設日天最高當月天最高丙太陽在最高後中距戊太陰亦在戊合朔測得太陰實行比平行少四度四十五分四十一秒太陰在最高前中距己望測得太陰實行比平行多五度九分二十一秒又設太陽在最高前中距己太隂亦在己合朔測得太陰實行比平行多四度四十五分四十一秒太陰在最高後中距戊望測得太隂實行比平行少五度九分二十一秒兩測太隂在戊實行皆比平行為少太陰在己實行皆比平行為多是知太陰在最高後則減最高前則加為初均之故矣然太陽在戊則少數小多數大太陽在己則少數大多數小是必另有一均因太陽在戊而加在己而減者若不因太陽之故則太隂在戊為減在己為加其數必相等也於是以大小兩數相減折半得一十一分五十秒别為一平均以減大數加小數得四度五十七分三十一秒為日距月天最高前後九十度時月距最高前後九十度之初均數最高後為減最高前為加也又設日天最高當月天最高後中距戊太陽在最高戊太陰在最高後中距戊合朔測得太陰實行比平行少四度五十九分五十六秒太陰在最高前中距己望測得太陰實行比平行多四度五十五分六秒又設日天最高當月天最高前中距己太陽在最高己太陰在最高前中距己合朔測得太陰實行比平行多四度五十九分五十六秒太陰在最高後中距戊望測得太陰實行比平行少四度五十五分六秒兩測太陰在戊實行皆比平行為少太陰在己實行皆比平行為多是知太陰在最高後則減最高前則加為初均之故矣然日天最高在戊月天最高距日天最高二百七十度則少數大多數小日天最高在己月天最高距日天最高九十度則多數大少數小是必另有一均因月高距日高九十度而加二百七十度而減者於是以大小兩數相減折半得二分二十五秒别為三均以減大數加小數得四度五十七分三十一秒為日距月天最高前後九十度時月距最高前後九十度之初均數最高後為減最高前為加與前測合又設日天最高當月天最高丙太陽在最高丙太陰在中距戊上弦測得太陰實行比平行少七度三十五分三十四秒太陰在中距己下弦測得太陰實行比平行多七度三十五分三十四秒又設日天最高當月天最卑丁太陽在最高丁太陰在中距己上弦測得太陰實行比平行多七度四十分二十四秒太陰在中距戊下弦測得太陰實行比平行少七度四十分二十四秒兩測太陰在戊實行皆比平行為少太陰在己實行皆比平行為多是知太陰在最高後則減最高前則加為初均之故矣然上弦則少數小多數大下弦則少數大多數小是必另有一均因上弦而加下弦而減者於是以大小兩數相減折半得二分二十五秒别為三均以減大數加小數得七度三十七分五十九秒為日在月天最高最卑時月距最高前後九十度之初均數最高後為減最高前為加也又設日天最高在庚月天最高丙距日天最高三百一十五度太陽在庚距月天最高四十五度太陰在戊距最高九十度而距日四十五度為朔與上弦之間測得太陰實行比平行少五度五十七分四十五秒若日天最高在辛月天最高距日天最高二百二十五度太陽在辛距月天最高一百三十五度太陰仍在戊距月天最高九十度而距日三百一十五度為下弦與朔之間測得太隂實行比平行少六度五十四分四十九秒又設日天最高在壬月天最高距日天最高一百三十五度太陽在壬距月天最卑四十五度太隂在己距最高前九十度而距日四十五度為朔與上弦之間測得太隂實行比平行多六度五十四分四十九秒若日天最高在癸月天最高距日天最高四十五度太陽在癸距月天最高三百一十五度太隂仍在己距最高前九十度而距日三百一十五度為下弦與朔之間測得太隂實行比平行多五度五十七分四十五秒兩測太陰在戊實行皆比平行為少太陰在己實行皆比平行為多是知太陰在最高後則減最高前則加為初均之故矣而朔與上弦之間則少數小多數大下弦與朔之間則少數大多數小是必另有一均因朔後而加朔前而減者而所大所小之數又不及二均加減之多是必又有别均加減於其間而此特為其加減之較於是以大小兩數相減折半得二十八分三十二秒為二均與二平均末均加減之較查朔後四十五度二均應加三十三分一十四秒