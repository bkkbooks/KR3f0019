一十五秒為負小輪全徑小輪心循負小輪周右旋行日距正交之倍度白極自小輪最逺㸃左旋行輪心之倍度如日在兩交無距度則小輪心在己白極在壬無交均仍以壬甲弧為距限也日距交九十度則小輪心自己行一百八十度至午白極自最逺子行三百六十度仍至子無交均仍以子甲為距限也如日距交四十五度則小輪心自己行九十度至未白極自最逺癸行一百八十度至辰戊甲辰角一度二十九分四十秒為交均辰甲五度八分三十四秒為距限也如日距交三十度則小輪心自己行六十度至申白極自最逺酉行一百二十度至戌戊甲戌角一度一十六分三十七秒為交均表多二秒戌甲五度一十二分五十八秒為距限也先用戊酉斗三角形求得酉斗邉七分四十一秒一六斗戊邉四分二十六秒二五則斗甲為五度一十二分五十三秒七五次求得酉戌通弦四十三秒三與酉斗相減餘六分五十七秒八六為斗戌邉然後用斗甲戌直角形求甲角及甲戌邉餘倣此如日距交六十度則小輪心自巳行一百二十度至亥白極自最逺亢行二百四十度至氐戊甲氐角一度一十八分五十秒為交均表少九秒氐甲五度四分六秒為距限也如此則交均距限理數皆極精宻而推算則屬繁難且交均用小輪與去一小輪全徑作小均輪其角度相去不逺見前距限用弦與用股其邉度亦相去不逺見後故將戊癸均輪半徑五百三十二秒半減癸辰小輪全徑五十秒餘戊辰四百八十二秒半作小均輪半徑則甲戊與戊辰之比常如五十七分半與一分半之比用切線分外角法即得逐度之交均以半徑一千萬為一率日距正交倍度之正矢為二率過九十度則用大矢仍以均輪壬戊半徑五百三十二秒半為三率酉斗癸戊亢牛等線皆為均輪正弦壬斗壬戊壬牛等線皆為均輪正矢故仍以均輪半徑為比例求得四率為距交減分如壬斗壬戊壬牛之類與壬甲最大距限五度一十七分二十秒相減即得逐度之距限也斗甲為五度一十二分五十四秒比戊甲少四秒戊甲為五度八分二十八秒比辰甲少六秒牛甲為五度四分一秒比氐甲少五秒故日相去不逺然此又惟朔望為然朔望而後交角又有加分因日距交與月距日之漸逺以漸而大至日距交九十度月距日亦九十度時交角比朔望大二分四十三秒蓋白道之上又有小輪其周之下點與白道相切日距交漸逺其徑漸大至日距交九十度時最大全徑為二分四十三秒其逐度之小輪全徑與最大小輪日距正交倍度之正矢等是為距交加差朔望而後白道以漸而張與白道小輪月距日倍度之正矢等凡正矢過九十度俱用大矢後倣此是為距日加分如白極在壬無日距交度則無白道小輪即無距交加差如白極在子日距交倍度為一百八十度則白道小輪女卯全徑為二分四十三秒即距交加差一百八十度之大矢即全徑故小輪全徑最大設兩弦時月距日倍度為一百八十度則白道自卯張至女女卯小輪全徑即為距日加分一百八十度之大矢即全徑故交角加分即與小輪全徑等與卯丙距限相加卯丙與子甲等得女丙為黄白大距設月距日倍度為六十度則白道張至危以半徑一千萬為一率六十度之正矢五百萬為二率半徑與餘弦相減為正矢小輪半徑一分二十一秒半為三率求得四率危卯四十一秒為距日加分與卯丙距限相加得危丙為黄白大距又如白極在辰日距交倍度為九十度則白道小輪乾坎全徑一分二十一秒半為女卯最大小輪全徑之一半是為距交加差九十度之正矢與半徑等故白道小輪全徑與最大小輪半徑等設月距日倍度為一百二十度則白道張至艮以半徑一千萬為一率一百二十度之大矢一千五百萬為二率半徑與餘弦相加為大矢小輪半徑四十秒七五為三率求得四率坎艮一分一秒為距日加分與坎震距限相加坎震與辰甲等得艮震為黄白大距其數悉與今表相合而表之立算則不用距交減分而總用加分其法以半徑一千萬為一率日距正交倍度之餘弦為二率壬戊均輪半徑八分五十二秒半為三率求得四率如斗戊與戊牛之類日距正交倍度九十度以内者與戊子半徑相加得數如斗子之類日距正交倍度九十度以外者與戊子半徑相減得數如牛子之類是為距交加分蓋前以壬斗壬牛等類之距交減分與壬甲最大距限相減此以斗子牛子等類之距交加分與子甲最小距限相加其得數同也至求距日加分則又用兩加差為比例先以半徑一千萬為一率日距正交倍度之正矢為二率最大加分二分四十三秒折半得一分二十一秒半為三率求得四率為距交加差次以半徑一千萬為一率月距日倍度之正矢為二率仍以最大加分之半數一分二十一秒半為三率求得四率為距日加差乃以最大加分二分四十三秒為一率距交加差為二率距日加差為三率求得四率為距日加分蓋距交加差即白道小輪全徑用其半徑與月距日倍度之正矢為比例即得距日加分今距日加差與距交加差同列一表仍以最大加分為全徑立算則其所得距日加差乃差之最大者故以最大加分即最大小輪全徑也與距交加差之比即本時小輪全徑也同於最大距日加差最大小輪全徑所生與本時距日加分之比也本時小輪全徑所生以距日加分與距交加分相加為交角加分與最小距限相加即為黄白大距蓋以距交加分加於最小距限與以距交減分減於最大距限其得數旣同而得距限之後再加距日加分與先以距日加分與距交加分相加而後加於最小距限其得數亦同也論法則用交角減分為明列表則用交角加分為便故推月離之法則兩載之實並行而不相悖也地半徑差太陰地半徑差以太陰距地平及距地心之逺近為大小上編言之詳矣顧舊法高卑距地心有定數而推距地平逐度之視差則皆用三角形立表易而推算難故自五十三倍地半徑至六十二倍地半徑列為十表今法高卑距地心無定數太陰之自行雖同度而距地心之逺近常不同至推距地平逐度之視差則即以距天頂之正弦與地平最大差為比例見本編日躔地半徑差篇立表難而推算易故以最大兩心差與最小兩心差各求太陰自高至卑逐度之地平最大差合為一表若兩心差在大小之間者則用中比例求之法見本表其求太陰自高至卑逐度地平最大差之法則先求得兩心差最大時最高距地心一六六七八二為六十三倍地半徑又百分之七十七最卑距地心九三三二一八為五十五倍地半徑又百分之七十九兩心差最小時最高距地心一四三三一九為六十二倍地半徑又百分之三十七最卑距地心九五六六八一為五十七倍地半徑又百分之一十九中距距地心一千萬為五十九倍地半徑又百分之七十八測算之法並同上編依法求得太陰自高至卑逐度距地心線與地半徑之比例及地平最大差列為表因其為推交食之用故表入交食焉御製厯象考成後編卷二
