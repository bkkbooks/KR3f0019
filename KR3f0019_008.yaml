front:
  text: 欽定四庫全書御製厯象考成後編卷八
  hash: sha256:cfd3b7686380dc73a7c110ce2a71593517ada7df3c6abb912be5164ba9b46a5b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0019_WYG_008-1a, image: WYG0792/WYG0792-0329c.png}
body:
  text: 月離表上太隂年根表太隂周嵗平行表太隂周日平行表太隂一平均表日距地立方較表太隂二平均表太隂三平均表太隂最高均及本天心距地表太隂年根表太隂年根表以距冬至及最高行即月孛行正交行逐年列之前用紀年者乃雍正元年後逐年之干支也表名距冬至者乃逐年天正冬至次日子正太隂平行距丑宫初度之宫度也求逐年距冬至法雍正元年癸卯太隂平行應五宫二十六度二十七分四十八秒五十三微即癸卯年天正冬至次日子正太隂平行距冬至之數此後用加法如本年為平年則加三百六十五日之太隂平行十三周天外又四宫零九度二十三分零三秒三十二微三十八纎五十五忽五十六芒滿全周去之餘為次年距冬至之數如本年為閏年則加三百六十六日之太隂平行十三周天外又四宫二十二度三十三分三十八秒三十四微零三纎一十二忽一十二芒滿全周去之餘為次年距冬至之數滿三十纎以上者進作一微不足三十纎者去之後倣此最高行者乃逐年天正冬至次日子正最高過冬至之宫度也求逐年最高行法雍正元年癸卯最高應八宫零一度一十五分四十五秒三十八微即癸卯年天正冬至次日子正最高過冬至之數此後用加法如本年為平年則加三百六十五日之最高行一宫一十度三十九分五十秒三十七微五十六纎四十七忽四十八芒即得次年最高過冬至之數如本年為閏年則加三百六十六日之最高行一宫一十度四十六分三十一秒四十二微零九纎三十六忽三十五芒又四分芒之一即得次年最高過冬至之數正交行者乃逐年天正冬至次日子正正交過冬至之宫度也求逐年正交行法雍正元年癸卯正交應五宫二十二度五十七分三十七秒三十三微即癸卯年天正冬至次日子正正交過冬至之數此後用減法如本年為平年則減三百六十五日之正交行一十九度一十九分四十三秒零六微零一纎一十三忽五十五芒半即得次年正交過冬至之數如本年為閏年則減三百六十六日之正交行一十九度二十二分五十三秒四十四微二十纎一十八忽一十三芒半即得次年正交過冬至之數用表之法如求乾隆壬戌年之年根則察本表紀年雍正元年癸卯後第一壬戌為所求之年乃視壬戌所對各數録之其距冬至為五宫一十七度二十八分一十六秒一十九微其最高行為九宫二十四度一十九分三十一秒五十六微其正交行為五宫一十五度三十分一十六秒零五微也太隂周嵗平行表太隂周嵗平行表以太隂平行及最高行正交行逐日列之其前用日數者自一日至三百六十六日之日數也表名平行者乃太隂自一日至三百六十六日之平行數也太隂每日平行一十三度一十分三十五秒零一微二十四纎一十六忽一十六芒纍加之即得逐日平行之數最高行者乃太隂自一日至三百六十六日之最高行數也最高每日行六分四十一秒零四微一十二纎四十八忽四十七芒纍加之即得逐日最髙行之數正交行者乃自一日至三百六十六日之正交行數也正交每日退行三分一十秒三十八微一十九纎零四忽一十八芒纍加之即得逐日正交行之數用表之法如求冬至後四十五日之太隂平行及最高行正交行則察本表日數四十五日所對各數録之其平行為七宫二十二度五十六分一十六秒零三微即四十五日太隂平行之共數其最高行為五度零四十八秒一十微即四十五日最高行之共數其正交行為二度二十二分五十八秒四十四微即四十五日正交行之共數也太隂周日平行表太隂周日平行表以一日內之時分秒遞降列之蓋時刻之分秒與度數之分秒皆以六十遞析一日二十四時每時六十分每分六十秒故太隂一時之平行與一分或一秒之平行皆同數不過遞降一位耳如太隂一時行三十二分有餘一分行三十二秒有餘一秒行三十二微有餘其平行之數同為三十二而為分為秒為微則遞降也表分兩段第一段自一至三十者一時至三十時一分至三十分一秒至三十秒第二段三十一至六十者三十一時至六十時三十一分至六十分三十一秒至六十秒其所對之數則太隂逐時逐分逐秒之各平行數也太隂每日之平行用二十四時除之得三十二分五十六秒二十七微三十三纎三十忽四十芒是為一時之平行纍加之為逐時之平行逐分逐秒之平行皆同數而遞降一位時之平行為度分秒微分之平行為分秒微纎秒之平行為秒微纎忽最高行與正交行皆倣此用表之法如求五時三十六分四十八秒之太隂平行及最高行正交行則察本表太隂平行五時所對之數為二度四十四分四十二秒一十八微三十六分所對之數為一十九分四十五秒五十二微三十二纎四十八秒所對之數為二十六秒二十一微一十纎零三忽合計三數得三度零四分五十四秒三十一微四十二纎零三忽即所求之太隂平行也最高行五時所對之數為一分二十三秒三十三微三十六分所對之數為一十秒零一微三十七纎四十八秒所對之數為一十三微二十七纎零九忽合計三數得一分三十三秒四十七微五十九纎零九忽即所求之最高行也正交行五時所對之數為三十九秒四十三微三十六分所對之數為四秒四十五微五十八纎四十八秒所對之數為六微二十一纎一十七忽合計三數得四十四秒三十五微一十九纎一十七忽即所求之正交行也太隂一平均表太隂一平均表按太陽引數宫度前後順逆列之初宫至五宫為最卑後順列於前六宫至十一宫為最高後逆列於後中列逐宫逐度之各平均大隂平均順度為減逆度為加最高平均順度為加逆度為減正交平均順度為減逆度為加用表之法以太陽引數之宫度對各平均之數即所求之各平均也表以十分為率若太陽引數有零分者按中比例法求之設太陽引數為一宫六度一十分引數有三十秒以上者進一分不及三十秒者去之後倣此求各均數則察一宫六度一十分所對太隂平均之數七分零六秒為所求之太隂平均其號為減即為減均也又察一宫六度一十分所對最高平均之數一十一分五十八秒為所求之最高平均其號為加即為加均也又察一宫六度一十分所對正交平均之數五分四十二秒為所求之正交平均其號為減即為減均也日距地立方較表日距地立方較表按太陽引數宫度分順逆列之初一二三四五宫列於上六七八九十十一宫列於下前後列太陽引數度中列逐宫逐度之日距地立方較乃本時太陽距地數之立方與太陽在最高距地數之立方相減之較也宫在上者用順度宫在下者用逆度用表之法以太陽引數之宫對太陽引數之度其縱橫相遇即所求之立方較也設太陽引數為一宫零六度引數有三十分以上者進一度不及三十分者去之求立方較則察一宫六度縱橫相對之日距地立方較為九二三即所求之立方較也太隂二平均表太隂二平均表按日距月最高宫度分順逆列之初一二六七八宫列於上三四五九十十一宫列於下前後列日距月最高度分中列太陽在最高時距月最高逐宫逐度之二平均傍列較數者乃太陽在最卑時距月最高逐宫逐度之二平均與太陽在最高時距月最高逐宫逐度之二平均相減之較也宫在上者用順度其號為減宫在下者用逆度其號為加用表之法以日距月最高之宫對日距月最高之度縱橫察得二平均及較數記之復以高卑立方大較一一四為一率前所求得本時之立方較為二率所記之較數為三率求得四率與所記之二平均相加即所求之二平均也表以十分為率若日距月最高有零分者按中比例法求之設日距月最高為三宫一十六度一十五分立方較為九二三求二平均則以三宫一十六度一十分所對二平均之數一分五十四秒與上層三宫一十六度二十分所對二平均之數一分五十六秒相減餘二秒為十分之較乃以十分為一率二秒為二率設數五分為三率求得四率一秒與三宫一十六度一十分所對之平均一分五十四秒相加因二十分之二平均大於一十分之二平均故相加反是則相減也得一分五十五秒記定又察三宫一十六度一十分所對之較數與三宫一十六度二十分所對之較數俱係一十二秒無庸比例即將一十二秒記定復以立方大較數一一四為一率所記較數一十二秒為二率所設立方較九二三為三率求得四率一十秒小餘九收作一十一秒與所記之二平均一分五十五秒相加得二分零六秒為所求之二平均其號為加即為加均也太隂三平均表太隂三平均表按日距正交宫度分順逆列之初一二六七八宫列於上三四五九十十一宫列於下前後列日距正交度分中列日距正交逐宫逐度之三平均宫在上者用順度其號為減宫在下者用逆度其號為加用表之法以日距正交之宫對日距正交之度其縱橫相遇即所求之三平均也表以逐度為率若日距正交有零分者按中比例法求之設日距正交為八宫二度四十六分求三平均則以八宫二度所對三平均之數三十九秒與下層八宫三度所對三平均之數三十八秒相減餘一秒為六十分之較乃以六十分為一率較數一秒為二率設數四十六分為三率求得四率十分秒之七六收作一秒與八宫二度三平均之數三十九秒相減因三度之平均小於二度之平均故相減反是則相加也得三十八秒即所求之三平均其號為減即為減均也太隂最高均及本天心距地表太隂最高均及本天心距地表按日距月最高宫度分順逆列之初一二六七八宫列於上三四五九十十一宫列於下前後列日距月最高度分中列逐宫逐度之最高均及本天心距地數並各列較數於其傍宫在上者用順度均數之號為加宫在下者用逆度均數之號為減用表之法以日距月最高之宫對日距月最高之度其縱橫相遇即所求之最高均及本天心距地數也表以十分為率若日距月最高有零分者按中比例法求之設日距月最高為三宫一十六度一十五分求最高均及本天心距地數則以十分為一率三宫一十六度一十分與二十分之間所對之較分三分五十五秒化作二百三十五秒為二率設數五分為三率求得四率一百一十七秒小餘五收作一分五十八秒與三宫一十六度一十分所對之最高均數七度五十四分五十秒相加因二十分之最高均大於一十分之最高均故相加反是則相減也得七度五十六分四十分秒為所求之最高均數其號為減即為減均也又以十分為一率三宫一十六度一十一十分與二十分之間所對之距地較數四四二為二率設數五分為三率求得四率二二一與三宫一十六度一十分所對之本天心距地數四五五七二相加因二十分之本天心距地數大於一十分之本天心距地數故相加反是則相減也得四五五九四一即所求之本天心距地數也御製厯象考成後編卷八
