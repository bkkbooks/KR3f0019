front:
  text: 欽定四庫全書御製厯象考成後編卷七
  hash: sha256:cc447c7f51764f0b167b7268a229ad369c9feb1a27ace35594cdb4776cc23948
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0019_WYG_007-1a, image: WYG0792/WYG0792-0296c.png}
body:
  text: 日躔表太陽年根表太陽周嵗平行表太陽周日平行表太陽均數表黃赤距度表黃赤升度表升度時差表均數時差表太陽距地心表清蒙氣差表太陽年根表太陽年根表以雍正元年癸卯為元其距冬至及最卑之度分與前表小異求逐年距冬至法以周日一萬分為一率太陽每日平行三千五百四十八秒小餘三二九八九七為二率以癸卯天正冬至氣應分數一千二百二十五分小餘四與周日一萬分相減餘八千七百七十四分小餘六為三率求得四率三千一百一十三秒小餘五一六八四三收作五十一分五十三秒三十一微為癸卯年距冬至之數此後以本年距冬至之數平年加三百六十五日之太陽平行三百五十九度四十五分四十秒零七微零三纎四十九忽零九芒半閏年加三百六十六日之太陽平行三百六十度四十四分四十八秒二十六微四十八纎三十二忽三十一芒半滿三百六十度去之即得次年距冬至之數求逐年最卑法癸卯年天正冬至最卑應八度零七分三十二秒二十二微即癸卯年最卑過冬至之數此後平年加三百六十五日之最卑行一分零二秒五十七微二十四纎四十三忽閏年加三百六十六日之最卑行一分零三秒零七微四十五纎四十忽即得次年最卑過冬至之數滿三十纎者進作一微不足三十纎者去之後倣此其紀日值宿並與前表法同用表之法如求乾隆元年丙辰之年根則察本表紀年自癸卯年後第一丙辰為所求之年乃視丙辰所對各數録之其距冬至為四十三分零二微最卑為八度二十一分一十一秒一十九微紀日為乙巳值宿為婁宿也太陽周嵗平行表太陽周嵗平行表以太陽平行及最卑行自一日至三百六十六日逐日列之表名平行者乃太陽自一日至三百六十六日之平行積度也太陽每日平行五十九分零八秒一十九微四十四纎四十三忽二十二芒零三塵纍加之即得逐日之平行最卑行者乃最卑自一日至三百六十六日之分秒也最卑每日行一十微二十纎五十七忽纍加之即得逐日之最卑行用表之法如求冬至後九十二日之太陽平行及最卑行則察本表日數九十二所對各數録之其平行為三宫零四十分四十六秒一十七微即九十二日太陽平行之共數其最卑行為一十五秒五十二微即九十二日最卑行之共數也太陽周日平行表太陽周日平行表以一日內之時分秒與逐時逐分逐秒之平行數對列之因太陽每日之平行比前表止差五纎有竒而列表至微而止故其數皆與前表同用表之法如求一十二時四十二分五十一秒之太陽平行則察本表一十二時所對之數為二十九分三十四秒一十微四十二分所對之數為一分四十三秒二十九微三十四纎五十一秒所對之數為二秒零五微四十纎一十二忽合計三數得三十一分一十九秒四十五微一十四纎一十二忽即所求之太陽平行也太陽均數表太陽均數表按最卑最高分順逆列之引數初宫至五宫為最卑後列於上引數六宫至十一宫為最髙後列於下前後列引數度分分順逆以别加減中列逐宫逐度之均數旁列較數太陽引數在上六宫者用順度其號為加太陽引數在下六宫者用逆度其號為減用表之法以引數之宫對引數之度分其縱橫相遇即所求之均數也表以十分為率若引數有零分者按中比例法求之設太陽引數為二宫五度一十二分求其均數則察二宫五度一十分所對之均數為一度四十六分二十三秒較數為八秒乃以引數一十分為一率較數八秒為二率設數二分為三率求得四率一秒小餘六收作二秒與二宫五度一十分之均數一度四十六分二十三秒相加因二十分之均數大於一十分之均數故相加反是則相減也得一度四十六分二十五秒為所求之均數其號為加即為加均也黃赤距度表黃赤距度表按二分二至分順逆列之二分後之各宫列於上降婁大梁實沈三宫係春分後為北緯夀星大火析木三宫係秋分後為南緯其數同二至後之各宫列於下鶉首鶉火鶉尾三宫係夏至後為北緯星紀元枵娵訾三宫係冬至後為南緯其數同太陽實行在上六宫者用順度太陽實行在下六宫者用逆度俱與前表同用表之法以實行之宫對實行之度分其縱橫相遇即所求之距度也表以十分為率若實行有零分者按中比例法求之設太陽實行在黃道大火宫二十一度一十五分求黃赤距度則以大火宫二十一度一十分所對之數一十八度零五分零二秒與下層二十一度二十分所對之數一十八度零七分三十九秒相減餘二分三十七秒為一十分之較乃以一十分為一率較數二分三十七秒化作一百五十七秒為二率設數五分為三率求得四率七十八秒小餘五收作一分一十九秒與大火宫二十一度一十分之距度一十八度零五分零二秒相加因二十分之距度大於一十分之距度故相加反是則相減也得一十八度零六分二十一秒為所求之距度也黃赤升度表黃赤升度表黃道宫度與赤道宫度並列之皆自冬至星紀宫起初宫即宫元枵宫為一宫以太陽經度為次用宫數不用宫名者太陽當交宫之際惟二分二至黃赤同度其餘恆不同宫故用宫數以便列表俱與前表同用表之法以太陽實行察黃道宫度其所對之赤道宫度即所求之赤道升度也表以逐度為率若實行有零分者按中比例法求之設太陽實行在黃道降婁宫五度二十四分求赤道升度自星紀宫起初宫計之為三宫五度二十四分則以黃道三宫五度所對之數三宫四度三十五分一十六秒與下層三宫六度所對之數三宫五度三十分二十二秒相減餘五十五分零六秒為一度之較乃以一度化作六十分為一率較數五十五分零六秒化作三千三百零六秒為二率設數二十四分為三率求得四率一千三百二十二秒收作二十二分零二秒與三宫五度之赤道度三宫四度三十五分一十六秒相加得三宫四度五十七分一十八秒為所求之赤道升度也升度時差表升度時差表按二分二至分順逆列之二分後六宫列於上二至後六宫列於下前後列黃道度分順逆以别加減中列逐宫逐度之升度時差即赤道升度與黃道相差度分所變時刻之分秒每一度變時之四分每十五分變時之一分每十五秒變時之一秒太陽實行在上六宫者用順度其號為加太陽實行在下六宫者用逆度其號為減俱與前表同用表之法以實行之宫對實行之度其縱橫相遇即所求之升度時差也設太陽實行在黃道大梁宫八度求升度時差則察大梁宫八度所對之數為九分三十秒即所求之升度時差其號為加即為加差也大梁宫在上故用順度若實行有零分者按中比例法求之均數時差表均數時差表按最卑最髙分順逆列之最卑後六宫列於上最髙後六宫列於下前後列引數度分順逆以别加減中列逐宫逐度之均數時差即均數度分所變時刻之分秒每一度變時之四分每一十五分變時之一分每一十五秒變時之一秒太陽引數在上六宫者用順度其號為減太陽引數在下六宫者用逆度其號為加俱與前表同用表之法以引數之宫對引數之度其縱橫相遇即所求之均數時差也設太陽引數為十一宫二十五度求均數時差則察十一宫二十五度所對之數為四十一秒即所求之均數時差其號為加即為加差也十一宫在下故用逆度若引數有零分者按中比例法求之太陽距地心表太陽距地心表按太陽實引宫度分分順逆列之初宫至五宫順列於上六宫至十一宫逆列於下前後列實引度分中列逐宫逐度之太陽距地心數表數皆以千萬為率故列表止八位今用九位者因較數甚小帶尾數一位比例方準也及其對數各列較數於其旁宫在上者用順度宫在下者用逆度用表之法以實引之宫對實引之度分其縱橫相遇即所求之太陽距地心數也表以十分為率若實引有零分者按中比例法求之設太陽實引為二宫五度一十二分求太陽距地心數則察二宫五度一十分所對之太陽距地心數為九九二六六八七六較數為四四一乃以實引一十分為一率較數四四一為二率設數二分為三率求得四率八八與二宫五度一十分之太陽距地心數九九二六六八七六相加因二十分之太陽距地心數大於一十分之太陽距地心數故相加反是則相減也得九九二六七七五六即所求二宫五度一十二分之太陽距地心數也求對數法同清蒙氣差表清蒙氣差表分四段列之每段前列距地平之度分後列距天頂之度分中列蒙氣差之分秒第一段距地平自初度至五度三十分距天頂自九十度至八十四度三十分第二段距地平自五度三十分至二十三度距天頂自八十四度三十分至六十七度第三段距地平自二十三度至五十六度距天頂自六十七度至三十四度第四段距地平自五十六度至八十九度距天頂自三十四度至一度其每段中列蒙氣差之分秒即距地平與距天頂逐度之蒙氣差也表列距地平度分自初度至七度因距地平近距天頂逺其蒙氣差之較數甚大故俱以十分為率自七度至十五度因距地平漸逺距天頂漸近其蒙氣差之較數漸小故俱以三十分為率自十五度至八十九度因距地平逺距天頂近其蒙氣差之較數甚微故俱以一度為率用表之法如測得七政或恆星髙四十度求蒙氣差則察距地平四十度所對之數為一分一十秒即所求之蒙氣差與視高四十度相減餘三十九度五十八分五十秒為實髙如先推得實髙三十九度五十八分五十秒則以蒙氣差一分一十秒與實髙相加得四十度為視髙如測得距天頂五十度求蒙氣差則察距天頂五十度所對之數為一分一十秒即所求之蒙氣差與距天頂五十度相加得五十度一分一十秒為實距天頂如先推得實距天頂五十度一分一十秒則以蒙氣差一分一十秒與實距天頂相減得五十度為視距天頂也高度與距天頂有零分者按中比例法求之御製厯象考成後編卷七
