body:
  text: 月食歩法推月食用數推月食法推各省月食法推月食帶食法推月食用數雍正元年癸卯天正冬至為元周天三百六十度入算化作一百二十九萬六千秒周日一萬分周歲三百六十五日二四二三三四四二紀法六十朔策二十九日五三五九五三太陽每日平行五十九分零八秒一十九微四十四纎四十三忽二十二芒與太陰每日平行一十三度一十分三十五秒零一微二十四纖一十六忽一十六芒相減餘一十二度一十一分二十六秒四十一微三十九纖三十二忽五十四芒為一日月距日之平行為一率周日一萬分為二率周天三百六十度為三率求得四率二十九日五千三百零五分小餘九五三為朔策即太陰復與太陽會之日數以一千四百四十分通之得二十九日一十二時四十四分零三秒零一微一十八纎二十七忽零四芒按新法算書朔策為二十九日五三五九三以一千四百四十分通之得二十九日一十二時四十四分零三秒一十四微零六纖四十三忽一十二芒上編仍之今因太陽每日平行比舊少五纎有奇太陰每日平行比舊多八纖有奇則月距日之行每日多一十三纖有奇故朔策比舊少一十二微有奇即萬分分之二百四十七也望策一十四日七六五二九五二六五太陰交周朔策一十一萬零四百一十三秒小餘九二四四一三三四太陰每日平行一十三度一十分三十五秒零一微二十四纎一十六忽一十六芒與正交每日平行三分一十秒三十八微一十九纎零四忽一十八芒相加得太陰每日距交行一十三度一十三分四十五秒三十九微四十三纎二十忽三十四芒與朔策日分相乘滿周天去之得一宫零四十分一十三秒五十五微二十七纖五十三忽一十七􅉭為交周朔策以秒法通之即得按新法算書交周朔策為一宫零四十分一十四秒零一微上編仍之今因太陰每日平行比舊多八纖有奇正交每日平行比舊少四纖有奇則太陰每日距交行比舊多三纖有奇然朔策比舊少一十二微有奇故交周朔策轉比舊少五微有奇也太陰交周望策六宫一十五度二十分零六秒五十八微中距太陰地半徑差五十七分三十秒太陽地半徑差一十秒中距太陽距地心一千萬中距太陰距地心一千萬中距太陽視半徑一十六分六秒中距太陰視半徑一十五分四十秒三十微黃赤大距二十三度二十九分氣應三十二日一二二五四朔應一十五日一二六三三朔應者雍正癸卯年首朔距天正冬至次日子正初刻之日分也以月距日一日之平行一十二度一十一分二十六秒四十一微三十九纎三十二忽五十四芒為一率周日一萬分為二率以癸卯年冬至次日子正初刻太陽平行五十一分五十三秒三十一微内減太陰平行五宫二十六度二十七分四十八秒五十三微餘六宫零四度二十四分零四秒三十八微為三率求得四率一十五日一二六三三二為癸夘年天正冬至次日子正初刻距第一朔之日分即癸夘年朔應也首朔太陰交周應六宫二十三度三十六分五十二秒四十九微首朔太陰交周應者雍正癸卯年首朔太陰距正交之行度也以癸夘年天正冬至次日子正初刻太陰平行五宫二十六度二十七分四十八秒五十三微内減正交平行五宫二十二度五十七分三十七秒三十三㣲餘三度三十分一十一秒二十微為癸夘年天正冬至次日子正初刻太陰距正交之度分又以朔應一十五日一二六三三二與太陰每日距交行一十三度一十三分四十五秒三十九微四十三纎二十忽三十四芒相乘得六宫二十度零六分四十一秒二十九微有奇為首朔太陰距交行之度分與天正冬至次日子正初刻太陰距正交之度分相加得六宫二十三度三十六分五十二秒四十九微有奇即癸夘年首朔太陰交周應也右推月食用數名義俱見下編因用日躔月離求實望故推太陽太陰平行自行諸用數兹皆不載推月食法推首朔及入交及實望實時下編以推首朔諸平行及入交為入算之首葢以平望太陽太陰諸平行皆以首朔諸平行為根也今以日躔月離求實望則太陽太陰諸平行不以首朔為根而以天正冬至為根故止求首朔之日時及入交之月數合之即得平望距冬至之日時而不必求首朔諸平行也求積年自雍正元年癸卯距所求之年共若干年減一年得積年求中積分以積年與周歲三百六十五日二四二三三四四二相乘得中積分求通積分置中積分加氣應三十二日一二二五四得通積分上考往古則置中積分減氣應得通積分求天正冬至置通積分其日滿紀法六十去之餘為天正冬至日分上考往古則以所餘轉與紀法六十相減餘為天正冬至日分求紀日以天正冬至日數加一日得紀日求積日置中積分加氣應分一二二五四不用日減本年天正冬至分亦不用日得積日上考往古則置中積分減氣應分加本年天正冬至分得積日求通朔置積日減朔應一十五日一二六三三得通朔上考往古則置積日加朔應得通朔求積朔及首朔置通朔以朔策二十九日五三五九五三除之得數加一為積朔餘數與朔策相減為首朔上考往古則置通朔以朔策除之得數為積朔餘數為首朔求首朔太陰交周以積朔與太陰交周朔策一十一萬零四百一十三秒九二四四一三三四相乘滿周天一百二十九萬六千秒去之餘數為秒以宫度分收之為積朔太陰交周加首朔太陰交周應六宫二十三度三十六分五十二秒四十九微得首朔太陰交周上考往古則置首朔太陰交周應減積朔太陰交周不及減者加十二宫減之得首朔太陰交周求逐月望太陰交周置本年首朔太陰交周加太陰交周望策六宫一十五度二十分零六秒五十八微再以太陰交周朔策一宫零四十分一十三秒五十五微遞加十三次得逐月望太陰交周求太陰入交月數逐月望太陰交周自初宫初度至初宫一十五度九分自五宫一十四度五十一分至六宫一十五度九分自十一宫一十四度五十一分至十一宫三十度皆為太陰入交第幾月入交即第幾月有食影半徑最大者四十六分五十一秒月半徑最大者一十六分四十八秒相併得六十三分三十九秒以此數當距緯用最小黃白交角四度五十九分三十五秒求得距交白道度一十二度一十六分五十四秒為實望可食之限又以最大太陽均數一度五十六分一十三秒最大太陰均數七度三十九分三十三秒相併得九度三十五分四十六秒為兩實行相距最逺之度計月逐及于日太陽又行五十五分餘與太陽均數相加得二度五十二分為實望距平望之數與實望可食之限相加得一十五度九分為平望可食之限圖解見上編太陰食限篇求平望以太陰入交月數與朔策二十九日五三五九五三相乘加望策一十四日七六五二九五二六五與首朔日分相加其所得日數即平望距冬至之日數再加紀日滿紀法六十去之自初日甲子起算得平望干支以周日一千四百四十分通其小餘得平望時分秒求實望泛時以平望距冬至之日數用推日躔月離法各求其子正黃道實行將太陽黃道實行加減六宫與太陰黃道實行相較如太陰實行未及太陽則平望日為實望本日平望次日為實望次日如太陰實行已過太陽則平望前一日為實望本日平望日為實望次日又用推日躔月離法各求其本日或次日子正黃道實行乃以本日次日兩太陽實行相減為一日之日實行本日次日兩太陰實行相減為一日之月實行一日之二實行相減為一日之月距日實行化秒為一率周日一千四百四十分為二率本日太陽實行加減六宫内減本日太陰實行餘化秒為三率求得四率為距本日子正後之分數以時收之得實望泛時如次日太陰實行仍未及太陽則次日為實望日即以次日太陽實行加減六宫内減次日太陰實行餘為三率所得四率為距次日子正後之分數如本日太陰實行已過太陽則前一日為實望日即以本日太陽實行加減六宫轉於本日太陰實行内減之餘為三率所得四率為距本日子正前之分數與一千四百四十分相減餘為距前一日子正後之分數求實望實時以實望泛時之時刻設前後兩時如實望泛時為丑正二刻則以丑正初刻為前時寅初初刻為後時用推日躔月離法各求其黃道實行乃以前後兩時太陽實行相減為一小時之日實行以前後兩時太陰實行相減為一小時之月實行一小時兩實行相減為一小時月距日實行化秒為一率一小時化作三千六百秒為二率前時太陽實行加減六宫内減前時太陰實行餘化秒為三率求得四率為秒以分收之加於前時得實望實時再以實望實時用推日躔月離法各求其黃道實行則太陰太陽必對宫而同度乃視本時月距正交自初宫初度至初宫一十二度一十七分自五宫一十七度四十三分至六宫一十二度一十七分自十一宫一十七度四十三分至十一宫三十度皆入食限為有食不入此限者不食即不必算推食望用時第一下編以推實望用時為月食第七段而有推平望諸平行推日月相距推實引推實望推實交周推太陽實經六段在其前今推月食以日躔月離求得實望而實望實交周及太陽黄道經度又已在本時日躔月離之中故不用前六段而即以推實望用時為月食第一段也求均數時差以實望太陽均數變時得均數時差一度變為四分十五分變為一分十五秒變為一秒均數加者則為減均數減者則為加求升度時差以半徑一千萬為一率黃赤大距二十三度二十九分之餘弦為二率實望太陽距春秋分黃道經度之正切線為三率實望太陽黃道經度不及三宫者與三宫相減過三宫者減三宫過六宫者與九宫相減過九宫者減九宫得太陽距春秋分黄道經度求得四率為距春秋分赤道經度之正切線檢表得太陽距春秋分赤道經度與太陽距春秋分黃道經度相減餘為升度差變時得升度時差二分後為加二至後為減求時差總均數時差與升度時差同為加者則相加為時差總仍為加同為減者亦相加為時差總仍為減一為加一為減者則相減為時差總加數大為加減數大為減求實望用時置實望實時加減時差總得實望用時距日出後日入前九刻以内者可以見食九刻以外者則全在晝即不必算推食甚實緯食甚時刻第二求斜距交角差以一小時太陰白道實行化秒為一邊本時次時二月離白道實行相減得一小時太陰白道實行太陽倣此一小時太陽黃道實行化秒為一邊實望黃白大距為所夾之角用切線分外角法求得對小邊之角為斜距交角差求斜距黃道交角置實望黃白大距加斜距交角差得斜距黃道交角求兩經斜距即一小時兩經斜距以斜距交角差之正弦為一率一小時太陽實行化秒為二率實望黃白大距之正弦為三率求得四率為秒以分收之得兩經斜距求食甚實緯即食甚兩心實相距以半徑一千萬為一率斜距黃道交角之餘弦為二率實望月離黃道實緯化秒為三率求得四率為秒以分收之得食甚實緯南北與實望黃道實緯同求食甚距弧以半徑一千萬為一率斜距黃道交角之正弦為二率實望月離黃道實緯化秒為三率求得四率為秒以分收之得食甚距弧求食甚距時以一小時兩經斜距化秒為一率一小時化作三千六百秒為二率食甚距弧化秒為三率求得四率為秒以分收之得食甚距時月距正交初宫六宫為減五宫十一宫為加求食甚時刻置實望用時加減食甚距時得食甚時刻自初時起子正一時為丑初以次順數至二十三時為夜子初每十五分為一刻不足一刻者為零分推食分第三求太陽實引置實望太陽引數加減