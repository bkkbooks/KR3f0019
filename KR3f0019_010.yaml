body:
  text: 交食表首朔諸根表朔望策表黃道赤經交角表太陽視半徑表太隂視半徑表太隂距地心表太隂地半徑差表太陽實行表太隂實行表首朔諸根表首朔諸根表以首朔及太隂交周逐年列之前用紀年者自癸卯年後逐年之干支也表名首朔者乃逐年天正冬至後第一平朔距冬至次日子正之日時也求逐年首朔法雍正元年癸卯朔應一十五日零三時零一分五十四秒五十五微四十五纎二十四忽二十九芒即癸卯年首朔之數此後用加法以本年首朔之數加十二朔策三百五十四日零八時四十八分三十六秒一十五微四十一纎二十四忽四十八芒如本年為平年則減去三百六十五日餘為次年首朔之數如本年為閏年則減去三百六十六日餘為次年首朔之數若不足減則再加一朔䇿二十九日一十二時四十四分零三秒零一微一十八纎二十七忽零四芒然後減之而本年即為有閏月也若首朔日時分在一日八時以內則閏月或在上年蓋表中所列首朔固是年前冬至後第一朔然係平朔距平冬至次日子正初刻之日時而定朔之距平朔最大者有二十一時定冬至之距平冬至本表三百年中最大者有十一時若定朔退而早定氣進而遲則定首朔在定冬至之前故本年首朔即為上年十一月朔而閏月即在上年本年即無閏月也表中遇此則上年十二月為上年首朔後第十三月本年正月為本年首朔後第二月太隂交周者乃逐年首朔太隂平行距正交之宫度也求逐年太隂交周法雍正癸卯年首朔太隂交周應六宫二十三度三十六分五十二秒四十九微二十四纎零一忽一十一芒即癸卯年首朔太隂平行過正交之數此後用加法如本年無閏月則加十二太隂交周朔䇿十三周天外又八度零二分四十七秒零五微三十四纎三十九忽二十四芒即得次年首朔太隂平行過正交之數如本年有閏月則加十三太隂交周朔策十四周天外又一宫零八度四十三分零一秒零一微零二纎三十二忽四十一芒即得次年首朔太隂平行過正交之數後列紀日值宿者乃逐年天正冬至次日之干支並所值之宿也至太陽平行太陽引數太隂引數諸根因用日躔月離求實朔望故皆不載用表之法如求乾隆元年丙辰之首朔諸根則察本表紀年自癸卯年後第一丙辰為所求之年乃視丙辰所對各數録之其首朔為二十一日一十三時一十四分零一秒其太隂交周為三宫一十一度三十四分一十四秒三十九微其紀日為四十一其值宿為一十五也紀日不列干支而列數目者以其便於加減也如丙辰年首朔為二十一日紀日為四十一日相加得六十二日滿紀法六十去之餘二日自初日甲子起算則知乾隆元年首朔為丙寅日也朔望策表朔望策表以朔策望策及太隂交周朔望策自一月至十三月逐月列之其求朔望策之法與前表同用表之法如求首朔後第五月之朔策則察本表月數五所對各朔策録之其朔䇿為一百四十七日一十五時四十分一十五秒其太隂交周朔策為五宫零三度二十一分零九秒三十七微求望策倣此黃道赤經交角表黃道赤經交角表按二分二至分順逆列之二分後之各宫列于上二至後之各宫列于下太陽實行在上六宫者用順度太陽實行在下六宫者用逆度俱與前表同因黃赤大距比前表小三十秒故交角之數比前表稍大耳用表之法以太陽實行之宫對實行之度其縱橫相遇即所求之交角也設太陽實行在黃道實沈宫五度求黃道赤經交角則察實沈宫五度所對之數為七十九度三十五分四十四秒即所求之交角也實沈宫在上故用順度若實行有零分者按中比例法求之太陽視半徑表太陽視半徑表按最卑最高分順逆列之最卑後六宫列于上最高後六宫列于下前後列實引度太陽實引在上六宫者用順度在下六宫者用逆度中列太陽視半徑之分秒即太陽自最卑至最高逐度之視半徑分秒也用表之法以太陽實引之宫對實引之度其縱橫相遇即所求之太陽視半徑也設太陽實引一宫九度求視半徑則察一宫九度所對之數為一十六分一十九秒即所求之太陽視半徑也一宫在上故用順度實引有零分者滿三十分以上則進作一度不用中比例因逐度視半徑所差甚微故也太隂視半徑表太隂視半徑表按最高最卑分順逆列之最高後六宫列於上最卑後六宫列於下太陽引數自最卑起初宫順行故列于上之初宫至五宫為最卑後六宫列于下之六宫至十一宫為最高後六宫太隂引數自最高起初宫順行故列於上之初宫至五宫為最高後六宫列於下之六宫至十一宫為最卑後六宫前後列實引度太隂實引在上六宫者用順度在下六宫者用逆度中列太隂大小兩視半徑之分秒蓋太隂本天心距地數即兩心差有大小之不同則視半徑亦有大小之異最高視徑小而兩心差之大者為尤小最卑視徑大而兩心差之大者為尤大故按兩心差之大小各求其逐宫逐度之視半徑而分列之也用表之法以太隂實引之宫度及本天心距地數察其相對之分秒即所求之太隂視半徑也若本天心距地數在大小之間者用中比例法求之設太隂實引為六宫八度本天心距地數為六五九七八九求太隂視半徑則以實引六宫八度所對最大兩心差之視半徑一十六分四十七秒與所對最小兩心差之視半徑一十六分二十三秒相減餘二十四秒為兩視半徑之較六宫在下故用逆度乃以最大兩心差六六七八二與最小兩心差四三三一九相減餘二三四六三為一率所設本天心距地數六五九七八九與最小兩心差四三三一九相減餘二二六五九九為二率兩視半徑較二十四秒為三率求得四率二十三秒與最小兩心差之視半徑一十六分二十三秒相加因最大兩心差之視半徑大于最小兩心差之視半徑故相加得一十六分四十六秒即所求之太隂視半徑也實引有零分者滿三十分以上則進作一度不用比例因逐度視半徑所差甚微故也太隂距地心表太隂距地心表按太隂實引宫度分順逆列之初宫至五宫順列於上六宫至十一宫逆列於下前後列實引度中列最大兩心差與最小兩心差逐宫逐度太隂距地心數旁列與地倍分宫在上者用順度宫在下者用逆度用表之法以太隂實引宫度及本天心距地數即兩心差察月距地數及倍數其縱橫相遇即所求之月距地心數及倍數也實引以逐度為率本天心距地數以最大數六六七八二與最小數四三三一九為率若太隂實引有零分及本天心距地心數在大小之間者用三次比例法求之設太隂實引為三宫一十八度四十三分本天心距地心數為四五五九四一求月距地心數則以六十分為一率實引三宫一十八度所對之最小兩心差四三三一九之月距地心數九八四九三八八與下層三宫一十九度所對之最小兩心差四三三一九之月距地心數九八四二四二四相減餘六九六四為二率設數四十三分為三率求得四率四九一九與三宫一十八度所對之最小兩心差四三三一九之月距地心數九八四九三八八相減因十八度所對之距地心數大於十九度所對之距地心數故相減反是則相加也餘九八四四四六七為所求月距地心數本位又以六十分為一率實引三宫一十八度所對最大兩心差六六七八二之月距地心數九七五四一八與下層三宫一十九度所對最大兩心差六六七八二之月距地心數九七四三五五六相減餘一五五二為二率設數四十三分為三率求得四率七五六二與三宫一十八度所對最大兩心差六六七八二之月距地心數九七五四一八相減相減之理與前同餘九七四六五四六為所求月距地心數次位乃以最大兩心差六六七八二與最小兩心差四三三一九相減餘二三四六三為一率本天心距地數四五五九四一與最小兩心差四三三一九相減餘二二七五一為二率本位月距地心數九八四四四六七與次位月距地心數九七四六五四六相減餘九七九二一為三率求得四率九四九五與本位月距地心數九八四四四六七相減得九八三四九七二即所求之月距地心數也如求月距地倍數則以六十分為一率實引三宫一十八度所對最小兩心差四三三一九旁列之倍分五十八倍八十八分與下層三宫一十九度所對最小兩心差四三三一九旁列之倍分五十八倍八十四分相減餘四分為二率設數四十三分為三率求得四率三分與三宫一十八度所對最小兩心差四三三一九旁列之倍分五十八倍八十八分相減餘五十八倍八十五分為所求距地倍數本位又以六十分為一率實引三宫一十八度所對最大兩心差六六七八二旁列之倍分五十八倍三十一分與下層三宫一十九度所對最大兩心差六六七八二旁列之倍分五十八倍二十五分相減餘六分為二率設數四十三分為三率求得四率四分與三宫一十八度所對最大兩心差六六七八二旁列之倍分五十八倍三十一分相減餘五十八倍二十七分為所求距地倍數次位乃以最大兩心差六六七八二與最小兩心差四三三一九相減餘二三四六三為一率本天心距地數四五五九四一與最小兩心差四三三一九相減餘二二七五一為二率本位距地倍數五十八倍八十五分與次位距地倍數五十八倍二十七分相減餘五十八分為三率求得四率六分與本位距地倍數五十八倍八十五分相減餘五十八倍七十九分即所求之距地倍數也太隂地半徑差表太隂地半徑差表按最高最卑分順逆列之最髙後六宫列於上最卑後六宫列於下前後列實引度太隂實引在上六宫者用順度在下六宫者用逆度中列太隂大小兩地半徑差之分秒乃太隂自最髙至最卑逐度所生地平上之最大地半徑差也蓋太隂本天心距地數有大小之不同則地半徑差亦有大小之異最髙地半徑差小而兩心差之大者為尤小最卑地半徑差大而兩心差之大者為尤大故按兩心差之大小各求其逐宫逐度之地半徑差而分列之也用表之法以太隂實引之宫度及本天心距地數察其相對之分秒即所求太隂在地平上之地半徑差也若本天心距地數在大小之間者用中比例法求之設太隂實引為六宫八度本天心距地數為六五九七八九求太隂在地平上之地半徑差則以實引六宫八度所對最大兩心差之地半徑差六十一分三十五秒與所對最小兩心差之地半徑差六十分零五秒相減餘一分三十秒為兩地半徑差之較六宫在下故用逆度乃以最大兩心差六六七八二與最小兩心差四三三一九相減餘二三四六三為一率所設本天心距地數六五九七八九與最小兩心差四三三一九相減餘二二六五九九為二率兩地半徑差較一分三十秒化作九十秒為三率求得四率八十六秒小餘九進作八十七秒收為一分二十七秒與所對最小之地半徑差六十分零五秒相加因最大兩心差之地半徑差大於最小兩心差之地半徑差故相加得六十一分三十二秒即所求太隂在地平上之地半徑差也實引有零分者滿三十分以上則進作一度不用中比例因逐度地半徑差所差甚微故也如求本日地平髙弧六十度之地半徑差則以半徑一千萬為一率本日太隂在地平最大地半徑差六十一分三十二秒化作三千六百九十二秒為二率地平髙弧六十度之餘弦五百萬為三率即距天頂之正弦求得四率一千八百四十六秒收作三十分四十六秒即所求本日高弧六十度之地半徑差也前表以太隂距地與地半徑比例數及髙度列表故中列地平髙弧逐度之地半徑差今以實引列表故止列太隂在地平之地半徑差而求髙弧逐度之地半徑差則又用比例法解見日躔地半徑差篇太陽實行表太陽實行表按最卑最高分順逆列之最卑後六宫列於上最高後六宫列於下前後列引數度太陽引數在上六宫者用順度在下六宫者用逆度中列逐宫逐度之太陽一小時之實行求太陽實行之法與前表同用表之法以太陽引數之宫對引數之度縱橫相遇即所求之太陽實行也設太陽引數為一宫二十五度求太陽實行則察一宫二十五度所對之數為二分三十一秒即所求之太陽實行也一宫在上故用順度引數有零分者滿三十分以上則進作一度不用中比例因逐度實行所差甚微故也太隂實行表太隂實行表按最髙最卑分順逆列之最髙後六宫列於上最卑後六宫列於下前後列引數度太隂引數在上六宫者用順度在下六宮者用逆度中列逐宫逐度太隂一小時之大小兩實行太隂一小時之平行恆為三十二分五十六秒二十八微而實行則有遲疾蓋因均數時時不同故也舊法以朔望時太隂止有初均數無二三均故亦如求太陽實行之法以一度為一率逐度初均數之較為二率太隂一小時之引數為三率求得四率為一小時初均數之較與太隂一小時之平行相加減即得逐宫逐度太隂一小時之實行今以太隂唯在朔望時無二三均若一小時之前與一小時之後則仍有二三均然則前所得太隂實行猶為初實行也以朔望前後之二均計之每度應加七十秒以朔望前後最大之三均計之每度應加三秒合二三均計之每度應加七十三秒而一小時月距日之行則約有半度強故以每度應加之二三均七十三秒折半得三十六秒半為每一小時應加二三均之數與前所推一小時太隂初實行相加方為太隂一小時實在之實行也蓋太隂本天心距地數有大小之不同則太隂之初均數與一小時之實行亦有大小之異最髙行遲而兩心差之大者為尤遲最卑行疾而兩心差之大者為尤疾故按兩心差之大小各求其逐宫逐度太隂一小時之實行而分列之也用表之法以太隂引數之宫度及本天心距地數察其相對之分秒即所求之太隂實行也若本天心距地數在大小之間者用中比例法求之設太隂引數為初宫十五度本天心距地數為六五九七八九求太隂一小時之實行則以引數初宫十五度所對最大兩心差之實行二十九分二秒與所對最小兩心差之實行三十分二十秒相減餘一分十八秒為兩實行之較初宫在上故用順度乃以最大兩心差六六七八二與最小兩心差四三三一九相減餘二三四六三為一率所設本天心距地數六五九七八九與最大兩心差六六七八二相減餘八三一為二率兩實行較一分十八秒化作七十八秒為三率求得四率二秒小餘六進作三秒與所對最大兩心差之實行二十九分二秒相加最小兩心差之實行大於最大兩心差之實行故相加得二十九分五秒即所求太隂一小時之實行也若引數有零分者則即以所近最大兩心差上下二度之實行比之所設兩心差與最大兩心差相近故用最大兩心差之實行不用三次比例因最大兩心差逐度實行之較與最小兩心差逐度實行之較所差甚微故也御製厯象考成後編卷十
