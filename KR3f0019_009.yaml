body:
  text: 月離表下太隂初均表太隂二均表太隂三均表太隂末均表太隂正交實均表交角加分表黄白升度差表黄白距緯表太隂初均表太隂初均表按太隂引數宫度分順逆列之初宫至五宫列於上六宫至十一宫列於下前後列太隂引數度分中列逐宫逐度之初均數因太隂兩心差隨時不同故表分大均中均小均三段最大兩心差六六七八二列為大均中數兩心差五五五五列為中均最小兩心差四三三一九列為小均宫在上者用順度其號為減宫在下者用逆度其號為加用表之法以太隂引數宫度及本天心距地數察其縱横相遇之均數即所求之初均數也表以十分為率若太隂引數有零分及本天心距地數在大均中均小均之間者用三次比例法求之本天心距地數在大均中均之間者則以大均數與中均數相比例本天心距地數在中均小均之間者則以中均數與小均數相比例設太隂引數為三宫一十八度四十三分本天心距地數為四五五九四一求初均數本天心距地數在中均小均之間應以小均為本位中均為次位則以十分為一率引數三宫一十八度四十分所對之小均數四度四十六分五十一秒與下層三宫一十八度五十分所對之小均數四度四十六分三十七秒相減餘一十四秒為二率設數三分為三率求得四率四秒與三宫一十八度四十分所對之小均數四度四十六分五十一秒相減因五十分所對之小均數小於四十分所對之小均數故相減反是則相加也餘四度四十六分四十七秒即引數三宫一十八度四十三分之小均數為初均本位又以十分為一率引數三宫一十八度四十分所對之中均數六度零六分零三秒與下層三宫一十八度五十分所對之中均數六度零五分四十六秒相減餘一十七秒為二率設數三分為三率求得四率五秒與三宫一十八度四十分所對之中均數六度零六分零三秒相減相減之理與前同餘六度零五分五十八秒即引數三宫一十八度四十三分之中均數為初均次位乃以最小兩心差四三三一九與中數兩心差五五五五相減餘一一七三一五為一率本天心距地數四五五九四一與最小兩心差四三三一九相減因本天心距地數四五五九四一在兩心差中數小數之間故與兩心差小數四三三一九相減若本天心距地數在兩心差大數中數之間則與兩心差中數五五五五相減餘二二七五一為二率本位初均四度四十六分四十七秒與次位初均六度零五分五十八秒相減餘一度一十九分一十一秒化作四千七百五十一秒為三率求得四率九百二十一秒收作一十五分二十一秒與本位初均四度四十六分四十七秒相加得五度零二分零八秒為所求之初均數其號為減即為減均也太隂二均表太隂二均表按月距日宫度分順逆列之初一二六七八宫列於上三四五九十十一宫列於下前後列月距日度分中列太陽在最高時月距日逐宫逐度之二均數傍列較數者乃太陽在最卑時月距日逐宫逐度之二均與太陽在最高時月距日逐宫逐度之二均相減之較也宫在上者用順度其號為加宫在下者用逆度其號為減用表之法以月距日之宫對月距日之度分縱横察其二均及較數各記之復以高卑立方大較數一一四為一率前所得本時立方較為二率所記之較數為三率求得四率與所記之二均相加即所求之二均數也表以十分為率若月距日有零分者按中比例法求之設月距日為十一宫一十九度三十分立方較為九二三求二均數則將十一宫一十九度三十分所對之二均一十一分五十五秒較數一分二十五秒各記定月距日無零分故無庸中比例乃以立方大較數一一四為一率前所得之立方較九二三為二率所記之較數一分二十五秒化作八十五秒為三率求得四率七十七秒收作一分一十七秒與所記之二均一十一分五十五秒相加得一十三分一十二秒為所求之二均其號為減即為減均也太隂三均表太隂三均表按日月最高相距與實月距日相加之總數宫度分順逆列之初一二六七八宫列於上三四五九十十一宫列於下前後列相距總數度分中列相距總數逐宫逐度之三均數宫在上者用順度宫在下者用逆度初宫至五宫其號為加六宫至十一宫其號為減用表之法以相距總數之宫對相距總數之度其縱横相遇之數即所求之三均數也表以十分為率若相距總數有零分者五分以上則進作十分不足五分者去之設相距總數為三宫二度二十四分求三均數則察三宫二度二十分所對三均之數為二分二十五秒即所求之三均其號為加即為加均也太隂末均表太隂末均表按日月最高相距宫度及實月距日宫度分上下前後順逆列之日月最高相距初一二六七八宫每隔十度順列於上三四五九十十一宫毎隔十度逆列於下實月距日初一二六七八宫逐度順列於前三四五九十十一宫逐度逆列於後中列日月最高相距及實月距日逐宫逐度之末均數日月最高相距初一二六七八宫用上度三四五九十十一宫用下度實月距日初一二宫其號為減六七八宫其號為加俱用順度三四五宫其號為減九十十一宫其號為加俱用逆度用表之法以日月最高相距之宫度對實月距日之宫度察其縱横相遇之數即所求之末均也表列實月距日以逐度為率若實月距日有三十分以上者進一度不及三十分者去之日月最高相距以十度為率若日月最高相距有零度者用中比例法求之設日月最髙相距為三宫一十三度實月距日為十一宫一十九度求末均數則先察日月最高相距三宫一十度條内横對實月距日十一宫一十九度之末均為三十秒次察三宫一十度條内横對實月距日十一宫一十九度之末均為二十七秒兩數相減餘三秒為日月最高相距一十度之較乃以一十度為一率較數三秒為二率設數三度為三率求得四率十分秒之九收作一秒與日月最高相距三宫一十度所對實月距日十一宫一十九度之末均三十秒相減因三宫二十度之末均小於三宫一十度之末均故相減反是則相加也餘二十九秒為所求之末均實月距日十一宫為加即為加均也太隂正交實均表太隂正交實均表按日距正交宫度分順逆列之初一二六七八宫列於上三四五九十十一宫列於下前後列日距正交度分中列日距正交逐宫逐度之正交實均宫在上者用順度其號為加宫在下者用逆度其號為減用表之法以日距正交之宫對日距正交之度分其縱横相遇之數即所求之正交實均也表以十分為率若日距正交有零分者按中比例法求之設日距正交為八宫二度四十六分求正交實均則以十分為一率日距正交八宫二度四十分所對之交均一度一十四分一十六秒與下層八宫二度五十分所對之交均一度一十三分五十八秒相減餘一十八秒為二率設數六分為三率求得四率一十秒小餘八收作一十一秒與八宫二度四十分之交均一度一十四分一十六秒相減因五十分之均數小于四十分之均數故相減反是則相加也餘一度一十四分零五秒為所求之正交實均其號為加即為加均也交角加分表交角加分表按日距正交宫度分順逆列之初一二六七八宫列於上三四五九十十一宫列於下前後列日距正交度中列日距正交逐宫逐度之距交加分及距交加差宫在上者用順度宫在下者用逆度用表之法以日距正交之宫度縱横察得本表之距交加分為距交加分察得加差為距交加差復以實月距日之宫度亦察本表之加差得距日加差然後以最大兩弦加分二分四十三秒與兩加差比例得距日加分與距交加分相加即得所求之交角加分也表以十分為率若日距正交及實月距日有零分者按中比例法求之設日距正交為八宫二度四十六分實月距日為十一宫一十九度一十六分求距交加分及加差則以十分為一率日距正交八宫二度四十分所對距交加分之數三分四十五秒與下層八宫二度五十分所對距交加分之數三分四十二秒相減餘三秒為二率設數六分為三率求得四率一秒小餘八收作二秒與日距正交八宫二度四十分之距交加分三分四十五秒相減因四十分之距交加分大於五十分之距交加分故相減反是則相加也餘三分四十三秒為所求之距交加分記之又察日距正交八宫二度四十分所對加差之數與下層八宫二度五十分所對加差之數俱為二分零九秒無庸比例即以日距正交八宫二度四十分之加差二分零九秒為所求之距交加差記之又察實月距日十一宫一十九度一十分所對加差之數與上層十一宫一十九度二十分所對加差之數俱為六秒亦無庸比例即以實月距日十一宫一十九度一十分之加差六秒為所求之距日加差記之然後以最大兩弦加分二分四十三秒化作一百六十三秒為一率所記距交加差二分零九秒化作一百二十九秒為二率所記距日加差六秒為三率求得四率四秒小餘七收作五秒為距日加分與前所記距交加分三分四十三秒相加得三分四十八秒即所求之交角加分也黄白升度差表黄白升度差表按月距正交宫度分順逆列之初一二六七八宫列於上三四五九十十一宫列於下前後列月距正交度中列最小交角月距正交逐宫逐度之升度差傍列較秒者乃最大交角月距正交逐宫逐度之升度差與最小交角月距正交逐宫逐度之升度差相減之較也宫在上者用順度其號為減宫在下者用逆度其號為加用表之法以月距正交之宫度分縱横察得升度差及較秒各記之復以交角大較數一十七分四十五秒為一率前所得本時交角加分為二率所記之較秒為三率求得四率與所記之升度差相加即得所求之升度差也表以十分為率若月距正交有零分者按中比例法求之設月距正交為七宫二十度五十一分交角加分為三分四十八秒求黄白升度差察月距正交七宫二十度五十分與七宫二十一度所對之升度差俱為六分二十四秒無庸比例即以七宫二十度五十分之升度差六分二十四秒記之又察月距正交七宫二十度五十分與七宫二十一度所對之較秒俱為四十七秒亦無庸比例即以七宫二十度五十分之較秒四十七秒記之然後以交角大較數一十七分四十五秒化作一千零六十五秒為一率交角加分三分四十八秒化作二百二十八秒為二率所記較秒四十七秒為三率求得四率一十秒與所記之升度差六分二十四秒相加得六分三十四秒為所求之升度差其號為減即為減差也黄白距緯表黄白距緯表按月距正交宫度分順逆列之初一二六七八宫列於上三四五九十十一宫列於下前後列月距正交度分中列最小交角月距正交逐宫逐度之距緯傍列較分者乃最大交角月距正交逐宫逐度之距緯與最小交角月距正交逐宫逐度之距緯相減之較也宫在上者用順度宫在下者用逆度初宫至五宫其號為北六宫至十一宫其號為南用表之法以月距正交之宫度分縱横察得距緯及較分各記之復以交角大較數一十七分四十五秒為一率前所得之交角加分為二率所記之較分為三率求得四率與所記之距緯相加即得所求之黄白距緯也表以十分為率若月距正交有零分者按中比例法求之設月距正交為七宫二十度五十一分交角加分為三分四十八秒求黄白距緯則以十分為一率月距正交七宫二十度五十分所對之距緯三度五十二分零九秒與七宫二十一度所對之距緯三度五十二分四十二秒相減餘三十三秒為二率設數一分為三率求得四率三秒與七宫二十度五十分之距緯三度五十二分零九秒相加因二十一度之距緯大於二十度五十分之距緯故相加反是則相減也得三度五十二分一十二秒為所求之黄白距緯記定又以十分為一率月距正交七宫二十度五十分所對之較分一十三分四十四秒與七宫二十一度所對之較分一十三分四十六秒相減餘二秒為二率設數一分為三率求得四率十分秒之二不足半秒無庸相加即將月距正交七宫二十度五十分之較分一十三分四十四秒為所求之較分記定然後以交角大較數一十七分四十五秒化作一千零六十五秒為一率交角加分三分四十八秒化作二百二十八秒為二率所記之較分一十三分四十四秒化作八百二十四秒為三率求得四率一百七十六秒收作二分五十六秒與所記之黄白距緯三度五十二分一十二秒相加得三度五十五分零八秒為所求之黄白距緯其號為南即為南緯也御製歴象考成後編卷九
