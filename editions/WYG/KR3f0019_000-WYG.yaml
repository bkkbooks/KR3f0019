front:
  text: 欽定四庫全書子部六御製厯象考成後編目録天文算法類一推􅇍之屬
  hash: sha256:6465f0593df4f94d80d6c36291cb841115c9cdb8b3e8297247312e33c10d787e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0019_WYG_000-1a, image: WYG0792/WYG0792-0001a.png}
body:
  text: 卷一日躔數理卷二月離數理卷三交食數理卷四日躔歩法月離歩法卷五月食歩法卷六日食歩法卷七日躔表卷八月離表上卷九月離表下卷十交食表臣等謹案御定厯象考成後編十卷乾隆二年奉􅃯撰新法算書推步法數皆仍西史第谷之舊其圖表之參差觧説之隠晦者聖祖仁皇帝厯象考成上下二編研精闡微窮究理數固己極一時推步之精示萬世修明之法矣第測驗漸久而漸精算術亦愈變而愈巧自康熙中西洋噶西尼法蘭徳等出又新製墜子表以定時千里鏡以測逺以發第谷未盡之義大端有三其一謂太陽地半徑差舊定為三分今測止有十秒葢日天半徑甚逺測量所係秪在秒微又有䝉氣雜乎其内最為難定因思日月星之在天惟恒星無地半徑差若以日星相較可得其凖而日星不能兩見是測日不如測五星也土木二星在日上地半徑差愈微金水二星雖有時在日下而其行繞日逼近日光均為難測惟火星繞日而亦繞地能與太陽衝故夜半時火星正當子午線於南北兩處測之同與恒星相較其距恒星若相等則是無地半徑差若相距不等即為有地半徑差其不等之數即兩處地半經差之較且火星衝太陽時其距地較太陽為近則太陽地半徑差以比例算之必更小于火星地半徑差也其一謂清䝉氣差舊定地平上為三十四分髙四十五度止有五秒今測地平上止三十二分髙四十五度尚有五十九秒其説謂䝉氣繞乎地球之周日月星照乎䝉氣之外人在地面為䝉氣所映必能視之使髙而日月星之光線入乎䝉氣之中必反折之使下故光線與視線在䝉氣之内則合而為一䝉氣之外則岐而為二所岐雖有不同而相合則有定處自地心過所合處作線抵圜周則此線即為䝉氣之割線視線與割線成一角光線與割線亦成一角二角相減即得䝉氣差角也其一謂日月五星之本天舊説為平圓今以為􅀈圓兩端徑長両腰徑短葢太陽之行有盈縮由於本天有髙卑春分至秋分行最髙半周故行縮而厯日多秋分至春分行最卑半周故行盈而厯日少其説一為不同心天一為本輪而不同心天之两心差即本輪之半徑故二者名雖異而理則同也第谷用本輪推盈縮差惟中距與實測合而最髙最卑前後則差因用均輪以消息之然天行不能無差刻白爾以來屢加精測又以均輪所推髙卑前後漸有㣲差乃設本天為撱圓均分撱圓而積為逐日平行之度則卑卑之理既與舊説無異而髙卑前後盈縮之行乃俱與實測相符也據此三者則第谷舊法經緯俱有微差雍正八年六月朔日食以新法較之纎微宻合是以世宗憲皇帝特允監臣戴進賢之請命脩日躔月離二表續於厯象考成之後然有表無説亦無推算之法吏部尚書顧琮恐久而失𫝊奏請増修表觧圖説仰請睿裁垂諸永久凡新法與舊不同之處始抉剔底藴闡發無餘而其理仍與聖祖仁皇帝御製上下二編若合符節益足見聖聖相承先後同揆矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
