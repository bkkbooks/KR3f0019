半周比之本輪則小距地逺故角小此其所以消息乎本輪之行度者當時必有所據而自刻白尔以來則謂髙卑之數均輪所定誠是但其數漸減耳至以推盈縮差則均輪之所消息者又屬太過惟以寅為不同心天之心作撱圓形自地心甲𤓰分之計太陽在撱圓周右旋其所行之分撱圓面積日日皆相等而用以推黄道實行之盈縮則在本輪均輪所得數之間而與實測脗合試以寅為心與己丑作十字線又取寅丑之度從甲截横線於午使午甲午己皆與寅丑半徑等乃以甲己兩㸃各為心午為界各用一針釘之圍以絲線末以鉛筆代午針引而旋轉即成丑午己未撱圓形寅丑寅己為撱圓大半徑寅午寅未為撱圓小半徑則撱圓不以甲己為心而以寅為心丑乙之卑於黄道巳丁之髙於黄道者止及甲己之半與寅甲等是髙卑之理與均輪合矣又将撱圓面積以甲為心均分為三百六十分每分之積皆為一度每一度積為六十分太陽每日右旋當每一度積之五十九分有竒是為平行在最卑半周甲心至撱圓界之線短則角度必寛是為行盈在最髙半周甲心至撱圓界之線長則角度必狹是為行縮故太陽循撱圓周行惟所當之面積相等而角不等其角度與積度之較即平行實行之差中距平行至申甲申丑積為撱圓四分之一為平行九十度與寅午丑積等申午酉積微大于酉寅甲積然所差無多故為相等亦與申己甲角等而自地心甲計之己當黄道之戌戌甲丑角為實行己申甲角為平行實行之差是中距之盈縮差與本輪均輪皆合矣用是以推逐度之盈縮差在最髙半周比之本輪固大比之均輪又微小最卑半周比之本輪固小比之均輪又微大驗諸實測庶為近之推算之法具詳後篇求兩心差及撱圓與平圓之比例新法算書日躔中距之盈縮差為二度零三分零九秒四十微檢其正切得兩心差為三五八四一六上編仍之今測中距之盈縮差得一度五十六分一十二秒折半得五十八分零六秒檢其正弦得一六九為兩心差倍之得三三八比舊數少千分之二有竒乃以兩心差一六九為勾平圓半徑一千萬為弦求得股九九九八五七一小餘八四八一九一即撱圓之小半徑而凡撱圓之正弦角度面積與平圓之比例皆同於撱圓之小半徑與平圓半徑之比例焉如圖甲為地心乙為本天心甲乙為兩心差甲丙為倍差丁戊己庚撱圓為本天乙丁為大半徑一午萬乙戊為小半徑丙戊甲戊皆與乙丁等太陽行至戊甲戊丁分撱圓面積八十九度一分五十四秒為平行其小於九十度之五十八分六秒即甲乙戊勾股積乙戊丁積為撱圓四分之一必九十度故甲戊丁積小於九十度之積即甲乙戊勾股積亦即乙戊甲角甲乙戊勾股積甲戊邊即大徑乙戊邊即小徑其積介乎大小徑之間與分平圓面相似故積度即角度若近甲丁則邊短而角大近甲己則邊長而角小詳後篇戊甲丁角九十度五十八分零六秒為實行其大於九十度者亦五十八分六秒即戊甲辛角與乙戊甲角等亦與丙戊乙角等平行實行之差一度五十六分一十二秒即甲戊丙角折半得五十八分零六秒即乙戊甲角甲戊既為一千萬則甲乙即乙戊甲角之正弦故檢表得一六九即甲乙兩心差以甲乙為勾甲戊為弦求得乙戊股九九九八五七一小餘八四八一九一即撱圓小半徑也既得撱圓小徑則凡撱圓之面線及角度皆可以得其比例以正弦之比例言之試以乙為心乙丁為半徑作丁壬己癸平圓則撱圓乙丁大半徑與平圓乙壬半徑相等戊乙小半徑之小於平圓半徑者即壬戊撱圓差若逐度割之則撱圓之餘弦必與平圓之餘弦相等而撱圓之正弦必小於平圓之正弦然平圓正弦與撱圓正弦之比例必同於平圓半徑與撱圓小半徑之比例也如丁㸃為初度無正弦丁乙為初度之餘弦平圓與撱圓等丁壬弧為九十度無餘弦壬乙為平圓九十度之正弦即大半徑戊乙為撱圓九十度之正弦即小半徑壬戊即九十度之撱圓差丁子弧為三十度丑乙為三十度之餘弦平圓與撱圓等子丑為平圓三十度之正弦寅丑為撱圓三十度之正弦子寅為三十度之撱圓差丁卯弧為六十度辰乙為六十度之餘弦平圓與撱圓等卯辰為平圓六十度之正弦巳辰為撱圓六十度之正弦卯巳為六十度之撱圓差則子丑與寅丑之比卯辰與巳辰之比皆同於壬乙與戊乙之比而子丑與子寅之比卯辰與卯巳之比皆同於壬乙與壬戊之比也奚以明其然也盖撱圓之與平圓處處皆有一小半徑藏乎其内試取壬戊之分於乙心作圜則午乙未乙申乙酉乙皆與壬戊等壬午卯未子申丁酉皆與戊乙等是推而抵於平圓之界各有一小半徑在也又自甲丙二㸃出線合於戊則小徑之端在戊而末在乙自甲丙二㸃出線合於丁則小徑之端在丁而末在酉若自甲丙出二線合於寅則小徑必端在寅而末在戌合於巳則小徑必端在巳而末在亥是引而歸於平圓之徑又各有一小半徑在也夫寅戌巳亥既皆為小徑而申戌未亥又與子丑卯辰為平行則寅戌與子申巳亥與卯未亦必為平行而申戌與子寅未亥與卯巳必各相等故乙子丑與戌寅丑及乙申戌為同式形乙卯辰與亥巳辰及乙未亥亦為同式形而子丑與寅丑之比同於子乙即壬乙與寅戌即戊乙之比卯辰與巳辰之比同於卯乙即壬乙與巳亥即戊乙之比又子丑與申戌即子寅之比同於子乙即壬乙與申乙即壬戊之比卯辰與未亥即卯巳之比同於卯乙即壬乙與未乙即壬戊之比是平圓與撱圓正弦之比例同於大徑與小徑之比例也以角度之比例言之設卯乙辰角為平圓六十度即丁卯弧求撱圓之巳乙辰角試以乙辰為半徑作弧則卯辰為卯乙辰角之正切巳辰為巳乙辰角之正切夫卯辰與巳辰之比既同於壬乙與戊乙之比則卯乙辰角之正切與巳乙辰角正切之比亦必同於壬乙與戊乙之比故以壬乙一千萬為一率戊乙九九九八五七一小餘八五為二率卯乙辰角六十度之正切一七三二五八為三率求得四率一七三一八三四為巳乙辰角之正切檢表得五十九度五十九分四十七秒即巳乙辰角而卯乙巳角一十三秒為撱圓差角卯乙辰角内減巳乙辰角餘即卯乙巳角又設巳甲辰角六十度五十分三十二秒求卯甲辰角試以甲辰為半徑作弧則巳辰為巳甲辰角之正切卯辰為卯甲辰角之正切夫卯辰與巳辰之比既同於壬乙與戊乙之比則巳辰與卯辰之比必同於戊乙與壬乙之比而巳甲辰角之正切與卯甲辰角正切之比亦必同於戊乙與壬乙之比故以戊乙九九九八五七一小餘八五為一率壬乙一千萬為二率巳甲辰角之正切一七九二三八九七為三率求得四率一七九二六四五七為卯甲辰角之正切檢表得六十度五十分四十五秒即卯甲辰角而卯甲巳角一十三秒為撱圓差角是平圓與撱圓角度之比例亦同於大徑與小徑之比例也再以面積之比例言之凡平圓面積與撱圓面積之比例同於平圓外切正方面積與撱圓外切長方面積之比例亦即同於撱圓大徑與小徑之比例撱圓大徑即平圓徑見幾何原本八卷第十二節如求撱圓六十度之面積則先設丁卯弧六十度求乙卯丁六十度之平圓面積以比之法以半周率三一四一五九二六五定率圓徑一千萬則圓周為三一四一五九二六五今一千萬為半徑故周率為半周用三分之得一四七一九七五五為卯丁弧線因卯丁弧六十度為半周三分之一故三分半周率而得卯丁弧線若有竒零則須用比例法與乙卯半徑一千萬相乗折半得五二三五九八七七五即乙卯丁分平圓六十度之面積而為丁壬己癸平圓全積六分之一又以壬乙大半徑一千萬為一率戊乙小半徑九九九八五七一小餘八五為二率乙卯丁積為三率求得四率五二三五二三九九七二四九五即乙己丁分撱圓六十度之面積而為丁戊己庚撱圓全積六分之一也此所得六十度積較之全積六分之一尾數稍大因小徑之小餘為八四八進為八五之故然於圓度只差纎忽可不計也蓋将平圓撱圓二面積依壬癸横徑縷析之則皆成線矣其線與線之比既同於大徑與小徑之比則面與面之比亦同於大徑與小徑之比故分之丁卯辰弧矢積與丁巳辰弧矢積之比卯辰乙勾股積與巳辰乙勾股積之比皆同於大徑與小徑之比而合之乙卯丁分平圓面積與乙巳丁分撱圓面積之比亦必同於大徑與小徑之比也既得撱圓與平圓之各比例則面線角度皆可得而求至於撱圓正弦以平圓命度而角度不同分撱圓面積與全積相當而角不相應則撱圓差之所生而與平圓之所以别也求撱圓大小徑之中率凡平圓面積自中心分之其所分面積之度即其心角之度以圜界為心角之規而半徑俱相等也若撱圓有大小徑角與積巳不相應矣見前篇况實行之角平行之積皆不以本天心為心而以地心為心太陽距地心線自最卑以漸而長逐度俱不等又何以知積之為度而與角相較乎然以大小徑之中率作平圓其面積與撱圓等将平圓面積逐度遞析之則度分秒皆可按積而稽撱圓之全積既與平圓全積等則其遞析之面積亦必相等故分撱圓面積雖非度亦可以度命之而度分秒亦可按積而稽也如圖甲為地心乙為本天心乙甲為兩心差丙甲為倍差丁戊己庚撱圓為本天乙丁為大半徑一千萬乙戊為小半徑九九九八五七一小餘八四八一九一試以乙丁大半徑作丁辛己壬平圓則平圓與撱圓二面積之比例同於平圓外切癸子丑寅正方積與撱圓外切卯辰巳午長方積之比例又試以乙丁大半徑為首率乙戊小半徑為末率求得乙申中率九九九九二八五小餘八九作平圓則大半徑所作丁辛己壬平圓與中率所作申酉戌亥平圓二面積之比例亦同於大徑平圓外切癸子丑寅正方積與中率平圓外切乾坎艮震正方積之比例此二比例既同而乾坎艮震正方積原與卯辰巳午長方積等首率末率相乘與中率自乗等則申酉戌亥平圓積亦必與丁戊己庚撱圓積相等矣乃以己丁大徑二千萬與戊庚小徑一九九九七一四三小餘六九六三八二相乗得卯辰巳午長方積與乾坎艮震正方積等以方與圓之比例定率七八五三九八一六二五通之得三一四一一四三九八二八二三三七為申酉戌亥平圓面積與丁戊己庚撱圓面積等将申酉戌亥平圓面積以三百六十度除之得八七二五三九九九五二二九為一度之面積其形為分平圓面其兩腰皆為中率半徑與乙申等其弧其角皆為一度若将丁戊己庚撱圓面積自甲心亦平分為三百六十分則其形為分撱圓面其兩腰自甲丁極短以漸而長逐度俱不等其弧其角亦不等然其每分之面積則皆與一度之面積等故凡分一段撱圓面積以一度之面積為法而一則面積即可以度分命之然後以面積之度與角度相較而平行實行之差出焉如以甲為心以中率為半徑作平圓則甲巽丁分撱圓面積為太陽距最卑後之平行度與甲離申分平圓面積等亦即與離甲申角等巽甲離角為平行實行之差其實行在平行前甲坤己分撱圓面積為太陽距最髙後之平行度與甲兑戌分平圓面積等亦即與兑甲戌角等兑甲坤角為平行實行之差其實行在平行後也撱圓角度與面積相求前篇言以面積之度與角度相較而平行實行之差以出盖太陽距最卑後平行之度必與太陽距地心線所分之撱圓面積等故可以平行度為面積而求實行也然實行固角度也以實測言之則先得實行後求平行以角而求積也易以推歩言之則先設平行後求實行以積而求角也難故先設以角求積之法可以知數理之實次設以積求角之法可以知比例之術次設借積求積借角求角之法可以知巧合補凑之方反覆參稽而數之離合乃纖悉畢呈焉圖説詳著於左先設以角求積法如圖甲為地心乙為本天心甲乙為兩心差丙甲為倍差丁戊己庚為本天丁為最卑己為最髙設太陽在辛辛甲丁角為實行距最卑後六十度求甲辛丁分撱圓面積平行若干度分先将甲辛線引長至壬作丙壬垂線成甲丙壬辛丙壬兩勾股形乃以半徑一千萬為一率甲角六十度之正弦八六六二五四為二率丙甲壬角與辛甲丁角為對角其度相等丙甲倍兩心差三三八為三率求得四率二九二七一六小餘五九為丙壬邊又以半徑一千萬為一率甲角六十度之餘弦五為二率丙甲邊為三率求得四率一六九為甲壬邊次以丙壬為勾自乗以甲壬與甲辛丙辛兩邊和二千萬相加得二一六九為股弦和除之得四二四八小餘二五為股弦較與股弦和相加折半得一八六六二四小餘一三為丙辛邊與二千萬相減餘九九一三三七五小餘八七為甲辛邊即太陽距地心線次以半徑一千萬為一率甲角六十度之正弦八六六二五四為二率甲辛邊為三率求得四率八五八五二三五小餘三即辛癸邊次以撱圓小徑九九九八五七一小餘八五為一率大徑一千萬為二率辛癸邊為三率求得四率八五八六四六一小餘五八即子癸邊檢正弦得五十九度九分五十三秒小餘六九即乙角度亦即子丁弧度次以半周天一百八十度化作六十四萬八千秒為一率半圓周定率三一四一五九二六小餘五為二率乙角度分化作二十一萬二千九百九十三秒小餘六九為三率求得四率一三二六二二五小餘四七八四九為子丁弧線與乙丁半徑一千萬相乗折半得五一六三一一二七三九二五為乙子丁分平圓面積次以撱圓大徑一千萬為一率小徑九九九八五七一小餘八五為二率乙子丁積為三率求得四率五一六二三七五三六九二五四六為乙辛丁分撱圓面積次以乙甲一六九與辛癸八五八五二三五小餘三相乗折半得七二五四五二八八二八五為辛乙甲三角積辛乙甲三角積以乙甲為底辛癸為髙故與同底同髙折半之積等與乙辛丁積相減餘五八九八三八九六九六即甲辛丁分撱圓面積以一度之面積定率八七二五三九九九五二二九除之得五十八度三三三四小餘八七收作五十八度二十分秒三十三微即實行距最卑後六十度時之平行度也又法求甲辛太陽距地心線将甲辛線引長至壬使辛壬與丙辛等又自丙至壬作丙壬線成甲丙壬三角形此形知丙甲倍兩心差三三八知甲壬二千萬甲辛丙辛共二千萬辛壬既與丙辛等故甲壬亦二千萬知甲外角六十度用切線分外角法求得壬角四十九分五十三秒小餘三六又求得丙壬邊二一七一八小餘二九次将丙壬邊折半於癸作辛癸垂線成壬癸辛直角形以半徑一千萬為一率壬角正割線一一五三小餘三五為二率癸壬邊一八五五四小餘一四五為三率求得四率一八六六二小餘六一為辛壬邊與甲壬二千萬相減餘九九一三三九七小餘三九即甲辛太陽距地心線也此法所得甲辛線較前法多二十二盖因壬角甚小比例易差耳然其角度自不爽故後借角求角之法則用之且以甲為心以二千萬為半徑作圜如甲壬又取兩心差之倍度截直徑於丙自丙出線至圜周如丙壬折半作垂線如癸辛所抵圜徑之㸃即撱圓界如辛㸃依法逐度作㸃連之即成撱圓周以此發明撱圓之理最為精巧故附於此又設太陽在壬壬甲己角為實行距最髙後六十度求甲壬己分撱圓面積平行若干度分則以半徑一千萬為一率甲角六十度之正弦八六六二五四為二率丙甲三三八為三率求得四率二九二七一六小餘五九為丙癸垂線又以半徑一千萬為一率甲角六十度之餘弦五為二率丙甲邊為三率求得四率一六九為甲癸分邊次以丙癸為勾自乘以甲癸與甲壬丙壬兩邊和二千萬相減餘一九八三一為股弦和除之得四三二小餘六六為股弦較與股弦和相加折半得九九一七六六小餘三三為丙壬邊與二千萬相減餘一八二三三九小餘六七為甲壬邊即太陽距地心線次以半徑一千萬為一率甲角六十度之正弦八六六二五四為二率甲壬邊為三率求得四率八七三一五六二小餘二五即壬子邊次以撱圓小徑九九九八五七一小餘八五為一率大徑一千萬為二率壬子邊為三率求得四率八七三二八九小餘四二即丑子邊檢正弦得六十度五十分三十一秒小餘八三即乙角度亦即己丑弧度次以半周天一百八十度化作六十四萬八千秒為一率半周率三一四一五九二六小餘五為二率乙角度分化作二十一萬九千零三十一秒小餘八三為三率求得四率一六一八九六二小餘七六六一一一九為已丑弧線與已乙半徑一千萬相乗折半得五三九四八一三八三五五九為乙丑已分平圓面積次以撱圓大徑一千萬為一率小徑九九九八五七一小餘八五為二率乙丑己積為三率求得四率五三八七二三一九四七二二為乙壬已分撱圓面積次以甲乙一六九與壬子八七三一五六二小餘二五相乗折半得七三七八一七一一二五為壬乙甲三角積與乙壬己積相加得五三八二五四八一四八四七即甲壬己分撱圓面積以一度之面積定率八七二五三九九九五二二九除之得六十一度六八七七小餘七二收作六十一度四十一分一十五秒五十八微即實行距最髙後六十度時之平行度也若設平行求實行亦可以所得之平行轉相比例然必累求累較方得恰合一率兩設平行較二率兩設實行較三率今設平行較四率今求實行較法屬繁難故兹不載次設以積求角之法如太陽在辛甲辛丁分撱圓面積為平行距最卑後一度求甲角實行若干度分法以甲丁最卑距地心九八三