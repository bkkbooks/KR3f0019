body:
  text: 日躔數理日躔總論嵗實黄赤距緯清蒙氣差地半徑差用撱圓面積為平行求兩心差及撱圓與平圓之比例求撱圓大小徑之中率撱圓角度與面積相求求均數日躔總論欽若授時以日躔為首務蓋日出而為晝入而為夜與月㑹而為朔行天一周而為嵗嵗月日皆於是乎紀故堯典以賓餞永短定治厯之大經萬世莫能易也其推􅇍之法三代以上不可考漢晉諸家皆以日行一度三百六十五日四分日之一而一周天自北齊張子信始覺有入氣之差而立損益之率隋劉焯立盈縮躔度與四序為升降厥法加詳至元郭守敬乃分盈縮初末四限較前代為密西法自多禄畝以至第谷則立為本天髙卑本輪均輪諸説用三角形推算其術尤精上編言之備矣近世西人刻白爾噶西尼等更相推考又以本天為撱圓均分其面積為平行度與舊法逈殊然以求盈縮之數則界乎本輪均輪所得數之間盖其法之巧合雖若與第谷不同而其理則猶是本天髙卑之説也至若嵗實之轉増距緯與兩心差之漸近地半徑差蒙氣差之互為大小則亦由於積候損益舊數以成一家之言今用其法並釋其義云嵗實日行天一周為嵗周嵗之日分為嵗實古法日行一度故周天為三百六十五度四分度之一嵗實為三百六十五日四分日之一周日為一萬分四分之一為二千五百分堯典曰朞三百有六旬有六日杜預謂舉全數而言則有六日其實五日四分日之一是也漢末劉洪始覺冬至後天以為嵗實太强減嵗餘分二千五百為二千四百六十二晉虞喜宋何承天祖沖之謂嵗當有差乃損嵗餘以益天周嵗差之法由斯而立元郭守敬取劉宋大明戊寅以來相距之積日時刻求得嵗實為三百六十五日二千四百二十五分比四分日之一減七十五分而天周即為三百六十五度二千五百七十五分矣西法周天三百六十度第谷定嵗實為三百六十五日五時三刻三分四十五秒以周日一萬分通之得三百六十五日二四二一八七五較之郭守敬又減萬分之三有竒以除周天三百六十度得每日平行五十九分零八秒一十九微四十九纖五十一忽三十九芒即十分度之九分八五六四七三六五八嵗差則謂恒星每年東行五十一秒不特天自為天嵗自為嵗而星又自為星其理甚明其用尤便上編仍之厥後西人奈端等屢測嵗實又謂第谷所減太過酌定嵗實為三百六十五日五時三刻三分五十七秒四十一微三十八纖二忽二十六芒五十六塵以周日一萬分通之得三百六十五日二四二三三四四二一四一五比第谷所定多萬分之一有竒以除周天三百六十度得每日平行五十九分零八秒一十九微四十四纖四十三忽二十二芒零三塵即十分度之九分八五六四六九六九三五一二八二二五比第谷所定少五纖有竒每年少三十微有竒盖嵗實之分數増則日行之分數減據今表推雍正元年癸卯天正冬至比第谷舊表遲二刻日躔平行根比舊表少一分一十四秒見推日躔用數而第谷去今一百四十餘年以數計之其差恰合是亦取前後兩冬至相距之積日時刻而均分之非意為増損也至於嵗實消長統天授時用之新法算書雖為之説而實未用其數兹不具論黄赤距緯黄赤距緯古今所測不同自漢以來皆謂黄道出入赤道南北二十四度元郭守敬所測為二十三度九十分三十秒以周天三百六十度每度六十分約之得三十三度三十三分三十二秒新法算書用西人第谷所測為二十三度三十一分三十秒康熙五十二年皇祖聖祖仁皇帝命和碩荘親王等率同儒臣於暢春園蒙養齋開局測太陽髙度得黄赤大距為二十三度二十九分三十秒今監臣戴進賢等厯考西史第谷所測盖在明隆萬時而漢時多禄畝所測為二十三度五十一分三十秒較第谷為多我朝順治年間刻白爾改為二十三度三十分後利酌理噶西尼又改為二十三度二十九分俱較第谷為少其前後多少之故或謂諸家所用蒙氣差地半徑差之數各有不同故所定距緯亦異然合中西考之第谷以前未知有蒙氣差而多禄畝與古為近至郭守敬則與第谷相若而去多禄畝則有十數分之多康熙年間所用蒙氣差地半徑差俱仍第谷之舊與刻白爾噶西尼等所用之數不同而所測大距又相去不逺由此觀之則黄赤距度古今實有不同而非由於所用差數之異所當隨時考測以合天也近日西法並宗噶西尼故黄赤大距為二十三度二十九分至於測量之術推算之理上編闡奥發微千古不易故不復載清蒙氣差清蒙氣差西人第谷始發其義謂地中遊氣上騰能升卑為髙映小為大而蒙氣之厚薄升像之髙下又隨地不同其所作蒙氣差表謂其國北極出地五十五度測得地平上最大蒙氣差三十四分自地平以上其差漸少至距地髙四十五度猶差五秒更髙則無蒙氣矣厥後西人又言北極髙四十八度太陽髙四十五度時蒙氣差尚有一分餘自地平至天頂皆有蒙氣差上編具載其説而表則仍新法算書第谷之舊也今監臣戴進賢等厯考西史第谷所定地平上蒙氣差其門人刻白爾即謂失之稍大而猶未定有確數至噶西尼始從而改正焉其説謂蒙氣繞乎地球之周日月星照乎蒙氣之外人在地面為蒙氣所映必能視之使髙而日月星之光線入乎蒙氣之中必反折之使下故光線與視線在蒙氣之内則合而為一蒙氣之外則岐而為二此二線所交之角即為蒙氣差角第谷己悟其理然猶未有算術噶西尼反覆精求謂視線與光線所岐雖有不同而相合則有定處自地心過所合處作線抵圜周則此線即為蒙氣之割線視線與割線成一角光線與割線亦成一角二角相減即得蒙氣差角爰在北極出地髙四十四度處屢加精測得地平上最大差為三十二分一十九秒蒙氣之厚為地半徑千萬分之六千零九十五視線角與光線角正弦之比例常如一千萬與一千萬零二千八百四十一用是以推逐度之蒙氣差至八十九度尚有一秒驗諸實測較第谷為密近日西法並宗之具詳圖法於左如圖甲為地心乙為地面乙甲為地半徑一千萬丙乙為蒙氣之厚六千零九十五丁為太陽月星倣此照於蒙氣之戊人自地面乙視之則見日於戊者當本天之巳巳戊乙為視線丁戊乙為光線是視線常髙光線常卑視線常直光線常折在戊㸃蒙氣之内則光線與視線合同為戊乙出乎戊㸃之外則視線己戊光線丁戊岐而為二故己戊丁角為蒙氣差角試自地心甲出線過戊㸃至庚則庚甲即為地平上蒙氣之割線己戊庚角為視線與割線所成之角丁戊庚角為光線與割線所成之角而己戊丁蒙氣差角即為兩角之較今既測得地平上蒙氣差為三十二分一十九秒又測定蒙氣之厚為六千零九十五則己戊庚視線角與丁戊庚光線角可以得其比例其術用甲乙戊直角三角形以甲戊一六九五與甲乙一千萬之比同於乙直角正弦一千萬與戊角正弦九九九三九八小餘七一之比而得戊角為八十八度小餘百分秒之四二即己戊庚角又以己戊丁蒙氣差角三十二分一十九秒與之相加得八十八度三十二分一十九秒小餘四二即丁戊庚角其正弦為九九九六七四八小餘二五夫視線角之正弦己辛為九九九三九八小餘七一則光線角之正弦丁壬為九九九六七四八小餘二五若設己辛為一千萬則丁壬必為一二八四一此兩角正弦之比例也既得兩弦之比例而蒙氣差之戊角與視線交蒙氣割線之戊角同以在地平為最大漸近天頂則漸小則是二者常相因而逐度之蒙氣差皆可以兩弦比例而推如求地平上髙二十度癸己弧之蒙氣差則癸戊乙為視線子戊乙為光線丑戊甲為地平上二十度蒙氣之割線戊乙丙角為七十度癸戊丑角為視線與割線所成之角其正弦為癸寅子戊丑角為光線與割線所成之角其正弦為子卯先用甲戊乙三角形求得戊角六十九度五十四分一十五秒小餘五五即癸戊丑角又以一千萬與一二八四一之比同於癸寅與子卯之比而得子戊丑角為六十九度五十六分五十五秒小餘九二兩角相減餘癸戊子角二分四十秒小餘三七即地平上二十度之蒙氣差也餘倣此地半徑差地半徑差者視髙與實髙之差也太陽距地平近則差角大漸髙則漸小又太陽在最卑距地心近則差角大在最髙距地心逺則差角小在中距為適中新法算書用歌白尼所定地半徑與中距日天半徑之比例為一與一千一百四十二地平上最大差為三分上編仍之其測量推算之法言之詳矣自後噶西尼等謂日天半徑甚逺無地半徑差而測量所係只在秒微又有蒙氣雜乎其内最為難定因思日月星之在天惟恒星無地半徑差若以日與恒星相較可得其準而日星不能兩見是測日不如測五星也土木二星在日上去地尤逺地半徑差愈微金水二星雖有時在日下而其行繞日逼近日光均為難測惟火星繞日而亦繞地能與太陽衝故夜半時火星正當子午線於南北兩處測之同與一恒星相較其距恒星若相等則是無地半徑差若相距不等即為有地半徑差其不等之數即兩處地半徑差之較且火星衝太陽時其距地較太陽為近則太陽地半徑差必更小於火星地半徑差也噶西尼用此法推得火星在地平上最大地半徑差為二十五秒比例得太陽在中距時地平上最大地半徑差為一十秒驗之交食果為脗合近日西法並宗其説今用所定地半徑差求地半徑與日天半徑之比例中距為一與二萬零六百二十六最髙為一與二萬零九百七十五最卑為一與二萬零二百七十七以求地平上最大之地半徑差最髙為九秒五十微最卑為一十秒一十微測算之法並述於左康熙十一年壬子秋分前十四日火星與太陽衝西人噶西尼於富郎濟亞國測得火星距天頂五十九度四十分一十五秒利實爾於噶耶那島測得火星距天頂一十五度四十七分五秒同時用有千里鏡能測秒微之儀器與子午線上最近一恒星測其相距噶西尼所測火星較低一十五秒如噶西尼測得火星距恒星下四十分一十五秒利實爾測得火星距恒星下四十分又逐日細測恒星距天頂噶西尼測得為五十九度利實爾測得為一十五度七分五秒各與所測火星距恒星之數相加即各得火星距天頂之度以之立法甲為地心乙為富郎濟亞國地面丙為天頂丁為噶耶那島地面戊為天頂己為火星丙戊己庚為子午線如兩地面不同在一子午線則須按東西里差求其同一子午線之髙度見上編日躔厯理己乙丙角為乙處火星視距天頂五十九度四十分一十五秒己丁戊角為丁處火星視距天頂一十五度四十七分五秒地面為視距地心為實距辛為恒星辛甲丙角為乙處恒星距天頂之度辛甲戊角為丁處恒星距天頂之度因恒星距地甚逺地面所視與地心無異故無地半徑差假若火星亦無地半徑差則乙處火星實距天頂當為己甲丙角丁處火星實距天頂當為己甲戊角而火星與恒星之相距即同為己甲辛角無髙低之異乃乙處所測火星距天頂為己乙丙角較之實距天頂之己甲丙角低一乙己甲角是即乙處之地半徑差也丁處所測火星距天頂為己丁戊角較之實距天頂之己甲戊角低一丁己甲角是即丁處之地半徑差也夫火星之距恒星一也因乙處所測火星距天頂逺故乙己甲差角大丁處所測火星距天頂近故丁己甲差角小則乙處所測火星距恒星較丁處􅊠一十五秒即兩差角相減所餘之丁己乙角乃兩處地半徑差之較也既得地半徑差較丁己乙角而欲求地平上最大差甲壬乙角則以兩處所測火星距天頂之正弦相減與地半徑差較秒數之比即同於半徑一千萬與地平上最大差