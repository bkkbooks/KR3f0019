之丑角以甲丑丙角為外角與甲寅二内角等丑寅既與甲丑等則甲角必與寅角等故倍寅角即得甲丑丙角與丙角四十五度分一十四秒小餘七三相加得四十六度二十三分二十四秒小餘二二為丑甲丁角度丑甲丁角為丑甲丙角之外角與丙丑二内角等故以丑角與丙角相加得丑甲丁角即平行距最卑後四十五度時之實行度也然則何以設丙角比平行積度大一撱圓差角而甲丑丁積即與平行積度相等也蓋與丙丑平行之乙癸線截本天於卯所截之乙卯丁積比甲丑丁積多一甲乙巳形乙卯丁積比甲丑丁積少一辰丑卯形多一甲乙辰形辰丑與甲辰等辰卯與己辰等辰丑卯積與辰甲巳積等以多補少尚多一甲乙巳積也此甲乙巳形之積與癸午倍撱圓差乘乙未餘弦折半之乙癸午三角形積等癸子辛壬皆撱圓差而辛壬㣲小於癸子子午又微小於辛壬然為數無多故謂癸午為倍差亦即與乙卯壬積等以卯癸子補子壬午弧内弧外所差無多故謂相等夫乙卯丁積比乙壬丁積多一乙卯壬形比甲丑丁積多一甲乙巳形甲乙已積既與乙卯壬積等則甲丑丁積必與乙壬丁積等而乙壬丁為分撱圓四十五度之面積辛乙丁角為四十五度之角癸乙丁角比辛乙丁角原大一撱圓差角丑丙丁角又原與癸乙丁角等故設丙角比平行積大一撱圓差角而甲丑線所截撱圓積即與平行積相等也然則又何以知甲乙巳積與乙癸午積相等也試以乙丁大半徑作乙丁申酉正方形又以乙戊小半徑作乙戊戌亥正方形兩積相減餘酉申丁亥戌戊磬折形積與兩心差自乘之甲乙乾坎正方積等乙丁與甲戊等為弦乙戊為股甲乙為勾股弦兩方相減與勾方等斜分而半之則乙甲坎勾股積即與酉申戌戊斜尖長方積等而申艮倍撱圓差與酉申相乘折半之乙申艮三角積原與酉申震戊長方積等乙申艮三角形與酉申震戊長方形同以酉申為髙而申艮為申震之一倍以申艮與酉申相乘折半得乙申艮三角積故與酉申震戊長方積等比酉申戌戊斜尖長方積僅多申震戌一小勾股積則借乙申艮三角積為與乙甲坎勾股積相等可也又以方為斜截丁辛弧為四十五度乙辛與乙丁等辛巽為四十五度之正弦辛離為四十五度之餘弦依乙戊小徑截乙辛線於坤依乙甲兩心差截乙辛線於兑與辛巽平行作坤亢兑氐二線與辛離平行作坤房兑尾二線所成正方各為前圖正方積之一半則於離辛巽乙正方形内減房坤亢乙正方形餘離辛巽亢坤房磬折形積亦與乙尾兑氐正方積等乙兑氐勾股積亦與離辛坤房斜尖長方積等而辛箕倍撱圓差乘辛離餘弦折半之乙辛箕三角積原與離辛壬房長方積等辛壬為四十五度之撱圓差辛箕為倍差與辛離餘弦相乗折半得乙辛箕積故與離辛壬房長方積等比離辛坤房斜尖長方積僅多辛壬坤一小勾股積則借乙辛箕三角積為與乙兑氐勾股積相等亦可也由此推之逐度之正弦餘弦所成之勾股雖非正方而斜弦不改則各數比例皆同試自與丙丑平行之乙癸線所截之癸㸃作癸未正弦癸斗餘弦又依乙戊小徑截乙癸線於牛作牛女牛虚二線又依甲乙兩心差截乙癸線於水作水火水金二線皆相平行則於斗癸未乙長方形内減去女牛虚乙長方形餘斗癸未虚牛女磬折形積亦與金水火乙長方積等乙水火勾股積亦與斗癸牛女斜尖長方積等而癸午倍撱圓差乗癸斗餘弦與乙未等折半之乙癸午三角積原與斗癸子女長方積等癸子為撱圓差癸午為倍差與癸斗餘弦相乗折半得乙癸午積故與斗癸子女長方積等比斗癸牛女斜尖長方積僅多癸牛子一小勾股積則借乙癸午積為亦與乙水火勾股積等而甲乙土勾股與乙水火勾股為相等形同用一乙角土角與火角同為直角而甲乙與乙水等故三邊及面積皆相等比甲乙巳積僅多甲巳土一小弧矢積其差只在微纎之間故謂甲乙巳積與乙癸午積相等也此法所得實行較前法多百分秒之二十四盖乙卯丁積比乙壬丁積多乙卯壬積實與甲乙土積等而比甲丑丁積僅多甲乙巳積則是甲丑丁積比乙壬丁四十五度積為稍大故所得實行丑甲丁角亦稍大計其所大之數適與甲巳土弧矢積度相去不逺至於以乙癸午三角積為與斗癸牛女斜尖長方積等其數微多多癸牛子勾股積以癸午為倍撱圓差其數微少然其多少之差約足相抵可不計也又如太陽平行距最卑後九十度求實行若干度分先從本天心設丁乙戊角九十度則乙戊丁分撱圓面積亦為九十度次與乙戊平行作丙癸線自甲至癸作甲癸線則丙角與戊乙丁角等而甲癸丁分撱圓面積即為九十度與乙戊丁積等九十度無撱圓差觧見後是為平行癸甲丁角即為實行乃將丙癸線引長至子使癸子與甲癸等則丙子為二千萬又自甲至子作甲子線成甲丙子三角形求得子角五十八分五秒小餘五五倍之得一度五十六分一十一秒小餘一即甲丙癸形之癸角度與丙角九十度相加得九十一度五十六分一十一秒小餘一為癸甲丁角度即平行距最卑後九十度時之實行度也盖乙戊丁為撱圓四分之一其積為九十度戊乙丁角亦九十度積度與角度同為一線故無撱圓差丙角既與乙角等甲癸丁積又與乙戊丁積等甲癸丁積比乙戊丁積多一丑癸戊形少一甲乙丑形而甲乙丑積與丑癸寅積等是丑癸戊形比甲乙丑形僅多癸戊寅一小弧矢積故謂丑癸戊積與甲乙丑積等而甲癸丁積亦謂與乙戊丁積等故即以平行積度為丙角而求甲角為實行度也此法所得實行較前法多百分秒之六十七盖甲癸丁積比乙戊丁積多癸戊寅弧矢積九十度稍大故實行亦稍大又丙角至九十度則弧矢之癸寅半弦與甲乙兩心差相等是為最長積亦最大故所差最多過此則所差又漸少矣又如太陽平行距最卑後一百二十度求實行若干度分先從本天心設丁乙癸角一百二十度則乙子丁分撱圓面積亦為一百二十度次将丁乙癸角減丑乙寅撱圓差角九十度以外小一撱圓差角故減則癸乙已外角大一撱圓差角以撱圓小半徑九九九八五七一小餘八五為一率大半徑一千萬為二率所設癸乙已外角六十度之正切一七三二五八為三率求得四率一七三二二九八一小餘九八為己乙寅外角之正切檢表得六十度分一十二秒小餘七六即己乙寅外角度與一百八十度相減餘一百一十九度五十九分四十七秒小餘二四即寅乙丁内角度次與乙寅平行作丙卯線自甲作甲卯線則丙角與寅乙丁角等甲卯丁積為分撱圓一百二十度之面積與乙子丁積等是為平行卯甲丁角即為實行乃将丙卯線引長至辰使卯辰與甲卯等則丙辰為二千萬又自甲至辰作甲辰線成甲丙辰三角形求得辰角四十九分五十三秒小餘四六倍之得一度三十九分四十六秒小餘九二即甲丙卯形之卯角度與丙内角一百一十九度五十九分四十七秒小餘二四相加得一百二十一度三十九分三十四秒小餘一六為卯甲丁角度即平行距最卑後一百二十度時之實行度也盖與丙卯平行之乙寅線截本天於巳所截之乙巳丁積比甲卯丁積小一卯己午形與甲乙未形等乙巳丁積比甲卯丁積少一卯己酉形多一甲乙酉形而甲乙酉形與卯午酉形等以多補少仍少一卯巳午形又将乙己線引長至未使酉未與酉巳等而酉甲原與酉卯等卯午原與甲乙等故作甲未弧則卯巳午積即與甲乙未積等此甲乙未形之積與寅申倍撱圓差乘乙戌餘弦折半之乙寅申三角形積等寅丑癸子皆撱圓差而癸子微小於寅丑丑申又微小於癸子然為數無多故謂寅申為倍差與乙戌餘弦相乘折半得積與甲乙亥勾股積等比甲乙未積僅小甲未亥一小弧矢積故借甲乙未積為與乙寅申積等亦即與乙子巳積等與前法同夫乙巳丁積比乙子丁小一乙子巳積比甲卯丁積小一甲乙未積甲乙未積既與乙子巳積等則甲卯丁積必與乙子丁積等而乙子丁為分撱圓一百二十度之面積癸乙丁角為一百二十度之角寅乙丁角比癸乙丁角原小一撱圓差角卯丙丁角又原與寅乙丁角等故於平行一百二十度内減一撱圓差角為丙角其甲卯線所截撱圓積即與平行度相等而求得甲角為實行度也此法所得實行較之前法多百分秒之四十一盖乙巳丁積比乙子丁積少乙子己積僅與甲乙亥積等而比甲卯丁積則少甲乙未積是甲卯丁積比乙子丁一百二十度積為稍大故所得實行卯甲丁角亦稍大然所差最大者不過半秒有竒不為不密而法最為簡便故日躔求實行用此法也求均數均數者盈縮差也最卑前後兩象限為行盈最髙前後兩象限為行縮然盈縮差自最卑最髙起算最髙前一象限雖行縮而實行仍大於平行故最卑後半周皆為加差最卑前一象限雖行盈而實行仍小於平行故最髙後半周皆為減差上編言之詳矣今求盈縮差用前借角求角之法與不同心天之法畧同但多一撱圓差耳故先以平行求得對倍兩心差之角又以平行求得撱圓差角與對倍兩心差之角相加減而得均數加減之法具詳於左如圖甲為地心乙為本天心甲乙為兩心差甲丙為倍差丁戊己庚為本天辛壬癸子為黄道以行度言之太陽在最卑前後當子辛辛壬兩象限其本天平行丑甲寅丁面積未及半周而以黄道度計之巳見自子行至壬故為行盈太陽在最髙前後當壬癸癸子兩象限其本天平行寅甲丑已面積巳過半周而以黄道度計之止見自壬行至子故為行縮以盈縮差言之太陽在最卑丁是為初宫初度當黄道之辛甲丁辛成一直線無盈縮差太陽在最髙已是為六宫初度當黄道之癸甲癸己成一直線亦無盈縮差而自最卑後行丁寅戊巳半周實行皆大於平行如平行至寅所截甲寅丁平行積度畧與寅丙丁角度等爭一撱圓差角故謂畧等自地心甲視之巳當黄道之壬壬甲辛角必大於寅丙丁角又如平行至戊所截之甲戊丁平行積度畧與戊丙丁角度等自地心甲視之己當黄道之卯卯甲辛角必大於戊丙丁角故皆為加差自最髙後行已庚丑丁半周實行皆小於平行如平行至庚所截甲庚已平行積度畧與庚丙己角度等自地心甲視之方當黄道之辰辰甲癸角必小於庚丙己角又如平行至丑所截甲丑巳平行積度畧與丑丙巳角度等自地心甲視之方當黄道之子子甲癸角必小於丑丙已角故皆為減差此盈縮之理與不同心天之理同至求盈縮差之法當先以平行積度加減撱圓差角九十度以内大一撱圓差角則加九十度以外小一撱圓差角則減正九十度無差角解見前為所設之丙角而求對倍差之角與所設之丙角相加得實行以平行與實行相減乃為均數解見前借角求角法然其數竒零不便立算故先以平行求得對倍差之角而後加減撱圓差角為尤便也如設太陽在己甲己丁分撱圓面積為平行距最卑後六十度知己丙甲角度比所設之甲己丁平行積度大一撱圓差角則於己丙甲角内減未丙午撱圓差角餘午丙甲角必為六十度而與甲巳丁平行積度相等故先設午丙甲角為六十度用甲丙午三角形求得對甲丙倍差之午角一度四十一分二十九秒與平行午丙甲角相加則得午甲丁角然太陽原在已當黄道之申實行申甲辛角即辛申弧比午甲丁角尚大一巳甲午角故又求得未丙午撱圓差角一十三秒與巳甲午角等巳甲午角與未丙午角同當巳午弧而甲午線短於丙午則角畧大然所差甚微故為相等與午角相加九十度以内大一撱圓差角故加得一度四十一分四十二秒是為均數為加差以加於平行而得實行也若太陽在酉當黄道之戌甲酉巳分撱圓面積爲平行距最高後一百二十度而距最卑前六十度則對甲丙倍差之亥角與午角等乾丙亥撱圓差角亦與未丙午角等但其均數爲減差以減於平行而得實行也如設太陽在亢甲亢丁分撱圓面積爲平行距最卑後一百二十度知亢丙甲角度比所設之甲亢丁平行積度小一撱圓差角則於亢丙甲角加房丙氐撱圓差角得氐丙甲角必為一百二十度而與甲亢丁平行積度相等故先設氐丙甲角為一百二十度用甲丙氐三角形求得對甲丙倍差之氐角一度三十九分四十七秒與平行氐丙甲角相加則得氐甲丁角然太陽原在亢當黄道之尾實行尾甲辛角即辛尾弧比氐甲丁角尚小一氐甲亢角故又求得房丙氐撱圓差角一十三秒與氐甲亢角等氐甲亢角與房丙氐角同當亢氐弧而甲氐線長於丙氐則角畧小然所差甚㣲故為相等與氐角相減九十度以外小一撱圓差角故減餘一度三十九分三十四秒是為均數為加差以加於平行而得實行也若太陽在斗當黄道之牛甲斗己分撱圓面積為平行距最高後六十度則對甲丙倍差之女角與氐角等女丙虛撱圓差角亦與房丙氐角等但其均數為減差以減於平行而得實行也用此法求得最卑後半周之加差即得最高後半周之減差列爲表此法與以丙爲心作不同心天之法畧同但多一撱圓差又平圓之半徑爲一千萬撱圓則自甲丙兩心出線合於圓界共爲二千萬耳而太陽距地高卑之差止及兩心差之半與均輪之法不謀而合故撱圓之法正所以合不同心天與本輪均輪而一之也御製厯象考成後編卷一
