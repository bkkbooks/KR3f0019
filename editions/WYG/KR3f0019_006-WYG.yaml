body:
  text: 日食歩法推日食用數推日食法推各省日食法推日食带食法日食諸角加減圖推日食用數雍正元年癸夘天正冬至為元周天三百六十度入算化作一百二十九萬六千秒周日一萬分周歳三百六十五日二四二三三四四二紀法六十朔策二十几日五三五九五三太隂交周朔策一十一萬零四百一十三秒小餘九二四四一三三四中距太隂地半徑差五十七分三十秒太陽地半徑差一十秒中距太陽距地心一千萬中距太陰距地心一千萬中距太陽視半徑一十六分六秒中距太隂視半徑一十五分四十秒三十微太陽光分一十五秒黄赤大距二十三度二十九分氣應三十二日一二二五四朔應一十五日一二六三三首朔太隂交周應六宮二十三度三十六分上十二秒四十九微推日食法推首朔及入交及實朔實時理與月食同求積年自雍正元年癸夘距所求之年共若干年減一年得積年求中積分以積年與周歳三百六十五日二四二三三四四二相乘得中積分求通積分置中積分加氣應三十二日一二二五四得通積分上考徃古則置中積分減氣應得通積分求天正冬至置通積分其日滿紀法六十去之餘為天正冬至日分上考徃古則以所餘轉與紀法六十相減餘為天正冬至日分求紀日以天正冬至日數加一日得紀日求積日置中積分加氣應分一二二五四不用日減本年天正冬至分亦不用日得積日上考徃古則置中積分減氣應分加本年天正冬至分得積日求通朔置積日減朔應一十五日一二六三三得通朔上考徃古則置積日加朔應得通朔求積朔及首朔置通朔以朔策二十九日五三五九五三除之得數加一為積朔餘數與朔策相減為首朔上考徃古則置通朔以朔䇿除之得數為積朔餘數為首朔求首朔太隂交周以積朔與太隂交周朔䇿一十一萬零四百一十三秒九二四四一三三四相乘滿周天一百二十九萬六千秒去之餘數為秒以宫度分収之為積朔太隂交周加首朔太隂交周應六宫二十三度三十六分五十二秒四十九微得首朔太隂交周上考徃古則置首朔太隂交周應減積朔太隂交周不及減者加十二宫減之得首朔太隂交周求逐月朔太隂交周置本年首朔太隂交周以太隂交周朔䇿一宫零四十分一十三秒五十五微逓加十三次得逐月朔太隂交周求太隂入交月數逐月朔太隂交周自初宫初度至初宫二十一度一十八分自五宫八度四十二分至六宫九度一十四分自十一宫二十度四十六分至十一宫三十度皆為太隂入交第幾月入交即第幾月有食太陽最大視半徑一十六分二十二秒三十微太隂最大視半徑一十六分四十八秒相併得三十三分一十秒三十微以此數當距緯用最小黄白交角四度五十九分三十五秒求得距交白道經度六度二十二分為黄道南實朔可食之限又以最大太陽太隂兩半徑相併之數與最大高下差一度一分二十七秒相加得一度三十四分三十七秒三十微以此數當距緯用最小黄白交角求得距交白道經度一十八度二十六分為黄道北實朔可食之限各加實朔距平朔之行度二度五十二分黄道南得九度一十四分黄道北得二十一度一十八分為平朔可食之限圖觧見上編太陽食限篇求平朔以太隂入交月數與朔䇿二十九日五三五九五三相乘得數與本年首朔日分相加其所得日數即平朔距冬至之日數再加紀日滿紀法六十去之自初日甲子起算得平朔干支以周日一千四百四十分通其小餘得平朔時分秒求實朔泛時以平朔距冬至之日數用推日躔月離法各求其子正黄道實行如太隂實行未及太陽則平朔日為實朔本日平朔次日為實朔次日如太陰實行已過太陽則平朔前一日為實朔本日平朔日為實朔次日又用推日躔月離法各求其本日或次日子正黄道實行乃以本日次日兩太陽實行相減為一日之日實行本日次日兩太隂實行相減為一日之月實行一日之二實行相減為一日之月距日實行化秒為一率周日一千四百四十分為二率本日太陽實行内減本日太隂實行餘化秒為三率求得四率為距本日子正後之分數以時收之得實朔泛時如次日太隂實行仍未及太陽則次日為實朔日即於次日太陽實行内減次日太隂實行餘為三率所得四率為距次日子正後之分數如本日太隂實行已過太陽則前一日為實朔日即以本日太陽實行轉於本日太隂實行内減之餘為三率所得四率爲距本日子正前之分數與一千四百四十分相減餘為距前一日子正後之分數求實朔實時以實朔泛時之時刻設前後兩時用推日躔月離法各求其黄道實行乃以前後兩時太陽實行相減為一小時之日實行以前後兩時太隂實行相減為一小時之月實行一小時兩實行相減為一小時月距日實行化秒為一率一小時化作三千六百秒為二率前時太陽實行内減前時太隂實行餘化秒為三率求得四率為秒以分収之加於前時得實朔實時再以實朔實時用推日躔月離法各求其黄道實行則太隂太陽必同宫同度乃視本時月距正交自初宫初度至初宫一十八度二十六分自五宫一十一度三十四分至六宫六度二十二分自十一宫二十三度三十八分至十一宫三十度皆入食限為有食不入此限者不食即不必算推實朔用時第一理與月食同求均數時差以實朔太陽均數變時得均數時差一度變為四分十五分變為一分十五秒變為一秒均數加者則為減均數減者則為加求升度時差以半徑一千萬為一率黄赤大距二十三度二十九分之餘弦為二率實朔太陽距春秋分黄道經度之正切線為三率實朔太陽黄道經度不及三宫者與三宫相減過三宫者減三宫過六宫者與九宫相減過九宫者減九宫得太陽距春秋分黄道經度求得四率為距春秋分赤道經度之正切線檢表得太陽距春秋分赤道經度與太陽距春秋分黄道經相減餘為升度差變時得升度時差二分後為加二至後為減求時差總均數時差與升度時差同為加者則相加為時差總仍為加同為減者亦相加為時差總仍為減一為加一為減者則相減為時差總加數大為加減數大為減求實朔用時置實朔實時加減時差總得實朔用時距日出前日入後五刻以内者可以見食五刻以外者則全在夜即不必算推食甚實緯及食甚用時第二求斜距交角差以一小時太隂白道實行化秒為一邉本時次時二月離白道實行相減得一小時太隂白道實行太陽倣此一小時太陽黄道實行化秒為一邉實朔黄白大距為所夾之角用切線分外角法求得對小邉之角為斜距交角差求斜距黄道交角置實朔黄白大距加斜距交角差得斜距黄道交角求兩經斜距即一小時兩經斜距以斜距交角差之正弦為一率一小時太陽實行化秒為二率實朔黄白大距之正弦為三率求得四率為秒以分収之得兩經斜距求食甚實緯即食甚用時兩心實相距以半徑一千萬為一率斜距黄道交角之餘弦為二率實朔月離黄道實緯化秒為三率求得四率為秒以分収之得食甚實緯南北與實朔黄道實緯同求食甚距弧以半徑一千萬為一率斜距黄道交角之正弦為二率實朔月離黄道實緯化秒為三率求得四率為秒以分収之得食甚距弧求食甚距時以一小時兩經斜距化秒為一率一小時化作三千六百秒為二率食甚距弧化秒為三率求得四率為秒以分収之得食甚距時月距正交初宫六宫為減五宫十一宫為加求食甚用時置實朔用時加減食甚距時得食甚用時推地平高下差及日月視徑第三下編推食甚用時之後即求三差而旣得食甚真時之後方求日月視徑今求各時高下差皆以本日地平高下差為比例而求地平高下差與日月視徑又皆由日月距地而生故以推地平高下差及日月視徑次於食甚用時之後為日食第三段也求太陽實引置實朔太陽引數加減本時太陽均數得太陽實引求太隂實引置實朔太陰引數加減本時太隂初均數得太隂實引求太陽距地以倍兩心差三三八為一邉以二千萬為兩邉和以太陽實引為一角用三角作垂線成兩勾股法算之實引三宫以内者即以實引為一角過九宫者與全周相減為一角俱作垂線於形外實引過三宫者與六宫相減過六宫者減六宫為一角俱作垂線於形内法見日躔撱圓角度與面積相求篇求得地心至撱圓界之一邉為太陽距地求太陰距地以實朔太陰本天心距地數倍之爲一邊以二千萬爲兩邊和以太陰實引爲一角用三角作垂線成兩勾股法算之實引三宮以内者卽以實引爲一角過九宮者與全周相減爲一角俱作垂線於形内實引過三宮者與六宮相减過六宮者減六宮爲一角俱作垂線於形外求得地心至撱圓界之一邊卽太陰距地求地平高下差以太隂距地為一率中距太隂距地一千萬為二率太隂中距最大地半徑差五十七分三十秒化作三千四百五十秒為三率求得四率為秒以分収之得本日太陰在地平上最大地半徑差減太陽地半徑差一十秒得地平高下差求太陽實半徑以太陽距地為一率中距太陽距地一千萬為二率中距太陽視半徑一十六分六秒化作九百六十六秒為三率求得四率為秒以分収之得太陽視半徑再減太陽光分一十五秒得太陽實半徑求太隂視半徑以太隂距地為一率中距太隂距地一千萬為二率中距太隂視半徑一十五分四十秒三十微化作九百四十秒半為三率求得四率為秒以分収之得太隂視半徑求併徑以太陽實半徑與太隂視半徑相加得併徑推食甚太陽黄赤經緯宿度及黄赤二經交角第四下編推太陽實經在推實朔用時之前而推黄赤宿度在推復圓真時之後今太陽黄道經度已在本時日躔之中而求日食三差則必用赤道緯度及黄赤二經交角與赤道經度宿度皆屬一體故以推黄赤經緯宿度及黄赤二經交角並在三差之前為日食第四段也求距時日實行以一小時化作三千六百秒為一率一小時太陽黄道實行化秒為二率食甚距時化秒為三率求得四率為秒以分収之得距時日實行食甚距時加者亦為加減者亦為減求食甚太陽黄道經度置實朔太陽黄道實行加減距時日實行得食甚太陽黄道經度下編即用實朔經度今實朔經度已見日躔而月食求太隂白道經度加減距時月實行故日食亦同一例究之所差無多故東西差雖亦有日行分而黄道經度皆不另算求食甚太陽黄道宿度察食甚太陽黄道經度足減本年黄道宿鈐内某宿度分則減之餘為食甚太陽黄道宿度求食甚太陽赤道經度以半徑一千萬為一率黄赤大距二十三度三十九分之餘弦為二率食甚太陽距春秋分黄道經度之正切線為三率食甚太陽黄道經度不及三宫者與三宫相減過三宫者減三宫過六宫者與九宮相減過九宫者減九宫得太陽距春秋分黄道經度求得四率為距春秋分赤道經度之正切線檢表得太陽距春秋分赤道經度自冬至初宫起算得食甚太陽赤道經度求食甚太陽赤道宿度察食甚太陽赤道經度足減本年赤道宿鈐内某宿度分則減之餘為食甚太陽赤道宿度求食甚太陽赤道緯度以半徑一千萬為一率黄赤大距二十三度二十九分之正弦為二率食甚太陽距春秋分黄道經度之正弦為三率求得四率為距緯之正弦檢表得食甚太陽赤道緯度春分後秋分前為北秋分後春分前為南求太陽距北極置九十度加減食甚太陽赤道緯度緯南則加緯北則減得太陽距北極求黄赤二經交角以食甚太陽距春秋分黄道經度之餘弦為一率黄赤大距二十三度二十九分之餘切線為二率半徑一千萬為三率求得四