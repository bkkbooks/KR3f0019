body:
  text: 交食數理交食總論用日躔月離求實朔望用兩經斜距求日月食甚時刻及兩心實相距求月食初虧復圓時刻食既生光附求日月實徑與地徑之比例視徑附求影半徑及影差求黄道高弧交角求月食初虧復圓併徑黄道交角即緯差角求白經高弧交角求高下差求日食食甚真時及兩心視相距求日食初虧復圓時刻方位附求日食帶食交食總論日月相㑹為朔相對為望朔而同度同道則月掩日而日為之食望而同度同道則月亢日而月為之食朔望日月皆東西同度而南北不皆同道同道則食顧推步之法月食猶易而日食最難以月在日下人在地面隨時隨處所見常不同也自大衍以至授時其法寖備我朝用西法推驗尤請上編言之詳矣近日西人噶西尼等益復精求立為新表其理不越乎昔人之範圍而其用意細密又有出於昔人所未及者如求實朔實望用前後二時日月實行為比例昔之用平朔平望實距弧者未之及也日月兩心相距最近為食甚兩周初切為初虧初離為復圓皆用兩經斜距為比例昔之用月距日實行者未之及也日食用圖算月之視行不與白道平行帶食日在地平視差即圓之半徑月之視距即見食之淺深昔之言視差者亦未之及也雖其數所差無多而其法實屬可取其他或因屢測而小有變更或因屢算而益求簡㨗則又考驗之常規而推步所當從也各為之說如左用日躔月離求實朔望從來求實朔望有二法一用本日次日兩子正日月黄道實行度比例其相㑹之時刻為實朔相對之時刻為實望推逐月朔望用之見下編推合朔弦望法以巳有本年逐日之日躔月離故也一用本年首朔先求本月平朔望之時刻然後求其平行實行之差比例加減而得實朔望之時刻推交食用之見上編朔望有平實之殊篇及下編推日食月食法因上考徃古下推將來不必逐日悉推其躔離而即可逕求其朔望故也斯二法誠不可偏廢但從前交食求平行實行之差太隂惟用初均故甚整齊簡易今求太隂初均又有諸平均之加減旣屬繁難而黄白大距又時時不同非推月離不得其凖故今交食推實朔望合二法而兼用之先推平朔望以求其入交之月次推本日次日兩子正之日躔月離以求其實朔望之時又推本時次時兩日躔月離以比例其時刻較之舊法似為紆逺然太隂之行甚速因遲疾差之故一日之内行度時時不同且平行實行之差大者至八九度則平朔望與實朔望之相距即至十有餘時今以前後兩時相比例較之止用兩子正實行度相比例者固為精宻即較之以距時為比例者亦又加詳矣用兩經斜距求日月食甚時刻及兩心實相距新法算書以實朔用時即為日食食甚用時以實望用時即為月食食甚時刻皆黄白同經太隂自道度與太陽黄道度相等為黄白同經上編以此時兩心斜距猶逺惟自白極過太陽作經圏與白道成直角太隂臨此直角之㸃兩心相距最近始為食甚故以白道升度差為食甚距弧以一小時月距日實行比例得時分與實朔望用時相加減方為食甚時刻月食即食甚時刻日食為食甚用時其法較前為加密矣見月食五限時刻日食三限時刻篇近日西法用日躔月離比例求實朔望是為黄道同經較之新法算書去食甚為尤逺而其求食甚之法則亦以兩心相距最近為食甚實緯以實朔望太隂距最近㸃之度為食甚距弧又以黄白二道原非平行而日月兩經常相斜距若以太陽為不動則太隂如由斜距線行故求兩心相距最近之線不與白道成直角而與斜距線成直角其距弧變時亦不以月距日實行度為比例而以斜距度為比例較之上編為尤近焉雖度分時刻所差無多而其理更為細密圖說詳著於左如圖甲乙為黄道丙乙為白道乙角為中交新法算書以日心在甲月心在丙為實朔影心在甲月心在丙為實望甲乙與丙乙等是為黄白同經無另求食甚之法上編以月行至丁為食甚甲丁距緯與白道成直角較甲丙為近故丙丁為食甚距弧以月距日實行比例得時分加於丙㸃實朔望之時刻方為食甚時刻今用日躔月離黄道度算則以日心在甲月心在戊為實朔影心在甲月心在戊為實望甲戊距緯與黄道成直角是為黄道同經戊之去丁較丙丁為尤逺按上編之法當以甲乙黄道度求丁乙白道升度與戊乙太隂距交白道度相減餘戊丁為食甚距弧而仍以甲丁距緯為食甚兩心實相距夫日月各有行分日在甲月既在戊逮月由戊行至丁則日亦不在甲而顧謂甲丁為食甚兩心實相距戊丁為食甚距弧者蓋月由戊行至己則日由甲行至庚庚己與甲丁平行甲庚與辛已等庚己與甲辛等丁己與辛己甲丁與庚己皆相差無多故借甲丁為與庚己等為兩心實相距借丁己為與辛己等為日行月食為影心行與日行等而戊己原為月行則戊丁即為月距日之行故即以戊丁為距弧以一小時月距日實行為比例即得食甚距時也今求食甚之法以戊乙與甲乙原非平行日月兩經常相斜距己㸃固為直角相對之時而其相距尤近必猶在己㸃之後試與甲乙平行作戊壬線為黄道距等圏取一小時日實行甲癸之分截之於子取一小時月實行截白道於丑則子丑為一小時兩經斜距又與戊子平行作丑寅線與子丑平行作戊寅線則寅丑與戊子等亦為一小時日實行戊寅與子丑等亦為一小時兩經斜距戊寅丑與戊辛己為同式形月行為戊丑則日行為寅丑與甲癸等斜距為戊寅月行為戊己則日行為辛己與甲庚等斜距為戊辛是日月二道原非平行而兩經斜距則常為一線若以日心為不動將庚㸃合於甲則月心己㸃必合於辛將癸㸃合於甲則月心丑㸃必合於寅是月在戊丑白道上行即如在戊寅斜距線上行矣乃自甲㸃與戊寅斜距成直角作甲夘線與丑寅平行作夘辰線與甲夘平行作辰巳線則甲己與夘辰等為實朔至食甚之日實行戊辰為實朔至食甚之月實行辰巳與甲夘等即食甚兩心實相距甲夘相距之近尤近於甲辛甲夘為股甲辛為弦股必短於弦也是月心臨於辰㸃方為食甚其實行在己㸃後也若以日心為不動將己㸃合於甲則月心辰㸃必合於夘故戊夘為食甚距弧求之之法先用戊丑寅三角形寅丑邊為一小時日實行戊丑邊為一小時月實行丑角與乙角等即本時黄白交角用切線分外角法求得戊角為斜距交角差斜距交角差者乃斜距黄道交角與黄白交角之差此本係弧線三角形因其形甚小故作直線算以從簡易並求得戊寅邊為一小時兩經斜距次用甲戊夘三角形以丑戊寅角與丑戊壬黄白交角相加戊壬寅丑二線皆與甲乙線平行故丑角戊角皆與乙角等得寅戊壬角為斜距黄道交角即與夘甲戊角等甲戊午與甲夘戊及戊夘午皆為同式三角形故寅戊壬角與夘甲戊角等乃以半徑與甲角餘弦之比同於甲戊與甲夘之比此亦作直線算而得甲夘為食甚兩心實相距又以半徑與甲角正弦之比同於甲戊與戊夘之比而得戊夘為食甚距弧然後以戊寅一小時兩經斜距為一率一小時為二率戊夘食甚距弧為三率求得四率為食甚距時蓋月行為戊辰日行為夘辰斜距為戊夘戊夘辰三角形與戊寅丑三角形為同式比例也今設乙角為四度五十八分三十秒丁甲戊角戊丑寅角丑戊壬角皆與乙角等甲乙為實朔太隂黄道距中交前十度戊甲為太隂距黄道北五十一分五十七秒六五寅丑為一小時日實行二分二十七秒八五戊丑為一小時月實行三十二分五十六秒四六舊法用甲乙戊三角形求得甲丁兩心實相距為五十一分四十五秒九戊丁距弧為四分三十秒三五以日月二實行相減得一小時月距日實行為三十分二十八秒六一此例食甚距時得八分五十二秒二四今法先用戊丑寅三角形求得丑戊寅角二十四分五秒八二與丑戊壬角相加得五度二十二分三十五秒八二為斜距黄道交角與夘甲戊角等又求得戊寅邉三十分二十九秒一九為一小時兩經斜距次用甲夘戊三角形求得甲夘兩心實相距為五十一分四十三秒九三比甲丁近二秒戊夘距弧為四分五十二秒一三以戊寅兩經斜距比例食甚距時得九分三十四秒九四比戊丁距時遲四十三秒是為兩心相距最近之時若實朔望在交後則日由乙向甲月由乙向戊兩心以漸而逺食甚在實朔望前距時比舊為早其法並同求月食初虧復圓時刻食既生光附月食求初虧復圓時刻以食甚實緯為一邊併徑為一邊以實緯交白道之角為直角用正弧三角形法求得初虧復圓距食甚之弧以一小時月距日實行比例得時分與食甚時刻相加減即得初虧復圓時刻初虧減復圓加上編言之詳矣見月食五限時刻篇今以弧線可作直線算故用勾弦求股之法即得距弧至以距弧變時則以一小時兩經斜距為比例葢食甚兩心實相距既與斜距成直角則初虧復圓之併徑亦與斜距成勾股故仍以斜距比例時分也圖說并著於左如圖甲乙為黄道丙乙為白道乙角為黄白交角實望時地影心在甲月心在丙食甚時地影心在丁月心在戊戊丁為食甚兩心實相距與甲己等丙己為食甚距弧初虧時地影心在庚月心在辛辛戊為初虧至食甚之月實行庚丁為初虧至食甚之日實行與壬戊等辛壬為初虧至食甚日月兩行之斜距與癸巳等即初虧距弧理與食甚同庚壬卽食甚兩心實相距與甲己等庚辛為併徑與甲癸等復圓時地影心在子月心在丑戊丑為食甚至復圓之月實行丁子為食甚至復圓之日實行與戊寅等寅丑為食甚至復圓日月兩行之斜距與巳夘等即復圓距弧子寅即食甚兩心實相距與甲己等子丑為併徑與甲夘等辛壬庚癸己甲丑寅子夘巳甲為相等四股勾形若以地影心為不動以食甚影心丁㸃合於甲則月心戊㸃合於巳以初虧影心庚㸃合於甲則壬㸃合於巳而月心辛㸃合於癸以復圓影心子㸃合於甲則寅㸃合於巳而月心丑㸃合於夘初虧復圓距弧即與癸夘斜距合為一線矣故今求初虧復圓距弧即用癸己甲勾股形以己甲為勾癸甲為弦求得癸己股與巳卯等為初虧復圓距弧夫癸己與己夘二弧既皆為兩經斜距則以二弧變時亦當與斜距為比例故以一小時兩經斜距與一小時之比同於癸己或己夘初虧復圓距弧與初虧復圓距時之比也若食既生光則甲癸甲夘二線為月半徑與影半徑相減之較其法并與初虧復圓同求日月實徑與地徑之比例視徑附從來算家謂日月之在天其實徑原為一定之數而視徑之大小則因距地有逺近而時時不同然所謂實徑者仍以視徑之大小距地之逺近比例而得今日月本天心之距地心數皆與舊不同則日月距地之逺近亦因之而各異且視徑之大小古今所測相差惟在分秒之間在器只争毫釐而在數已差千百則實徑究亦未有一定之數也新法算書載日實徑為地徑之五倍有餘中距日天半徑與地半徑之比例為一與一千一百四十二月實徑為地徑百分之二十七强中距朔望時月天半徑與地半徑之比例為一與五十六又百分之七十二上編仍之以推最高日天半徑與地半徑之比例為一與一千一百六十二最卑日天半徑與地半徑之比例為一與一千一百二十一見日躔地半徑差篇最高朔望時月天半徑與地半徑之比例為一與五十八又百分之一十六最卑朔望時月天半徑與地半徑之比例為一與五十四又百分之八十四見交食日月距地與地半徑之比例篇今監臣戴進賢等據西人近年所測日天半徑與地半徑之比例最高為一與二萬零九百七十五中距為一與二萬零六百二十六最卑為一與二萬零二百七十七月天半徑與地半徑之比例最高為一與六十三又百分之七十七中距為一與五十九又百分之七十八最卑為一與五十五又百分之七十九詳本編曰躔月離地半徑差篇又用逺鏡儀西人黙爵所製以逺鏡加衡為窺管測得日視徑最高為三十一分四十秒中距為三十二分一十二秒最卑為三十二分四十五秒月視徑最高為二十九分二十三秒中距為三十一分二十一秒最卑為三十三分三十六秒用此數推算日實徑為地徑之九十六倍又十分之六月實徑為地徑百分之二十七小餘二六强夫月實徑與舊大致相符而日實徑差至十九倍者蓋今所測日距地數比舊原大十八倍餘則日實徑比舊大十九倍止為大十八分之一故今之日視徑亦比舊大十八分之一是則視徑之大小固各得之實測要亦合諸推算以成一家之言至於日體純陽其光恒溢於常徑之外新法算書謂周圍皆大一分今說謂大一十五秒故推日食之法必於併徑内減去太陽光分一十五秒餘與視緯相較方為受食之分而日之本徑則仍帶光分算其理固應爾也測算之法並見上編求影半徑及影差地影半徑之大小由於太陽距地有逺近及太隂距地有高卑故先以太陽在最高所生之大影為率求得太隂從高及卑所當地影之濶為影半徑又以太陽從高及卑所生各影小於大影之較為影差與影半徑相減乃為實影半徑上編言之詳矣見地影半徑篇今以三角形之理考之日月兩地半徑差相併即與日半徑影半徑相併之數等而日月地半徑差及日半徑皆推交食所必用之數且又皆由距地之高卑逺近而生故近日西法皆不用另求影半徑惟以日月兩地半徑差相加内減去日半徑餘即為實影半徑以影差已在其中也此外又有視影之說蓋以地上有蒙氣差能映小為大則太陽實徑必小於視徑實徑小則影大矣又月食時日在地下蒙氣轉蔽日光則地影視徑必尤大於實徑計其所大之分約為太隂地半徑差六十九分之一故又以此為影差與實影半徑相加為視影半徑則所謂影差者名雖同而義實異也總之算家立說古今不必相同然測驗皆期於合天而推步必歸於有據舊說謂太陽有光分能侵地影使小今說謂地周有蒙氣能障地影使大此亦極不同之致矣然最大影半徑舊為四十六分四十八秒今為四十六分五十一秒相差不過三秒最小影半徑舊為四十二分三十八秒今為三十八分二十八秒相差四分有餘蓋地影之大小固由於太陽距地之逺近及太隂距地之高卑而太隂所闗為尤重查最卑太隂距地今昔相差不過百分地半徑之九十五最高太隂距地則相差至百分地半徑之五百六十一夫月之距地既因兩心差而不同則月徑與影徑遂亦因之而各異要皆據一時之所測設法推步以求合而非為臆說也圖說詳著於左如圖甲乙為地半徑甲丙為日天半徑丙丁為日半徑從丁切乙作光線與丙甲線交於戊甲戊為地影之長甲己為月天半徑庚己辛為月行所當地影之濶己甲辛角為影半徑分詳上編地影半徑篇試觀甲丁辛三角形丁辛二内角與壬甲辛一外角等而丁角即太陽地半徑差辛角即太隂地半徑差甲丁線畧與甲丙日天半徑等甲辛線畧與甲巳月天半徑等而其角皆與甲乙地半徑相當故其角即為地半徑差角壬甲巳角與丙甲丁角為對角即日半徑故以丁角太陽地半徑差與辛角太隂地半徑差相加即得壬甲辛角内減日半徑壬甲己角餘己甲辛角即實影半徑蓋日月地半徑差及日半徑既因日月距地之高卑逺近而時時不同故所得影半徑即為本時之實影半徑不復有影差也又蒙氣映小為大丙丁為太陽視半徑丙癸為太陽實半徑從癸切乙作光線與丙甲線交於子則月行所當地影半徑為己丑而己丑之分必大於己辛且地球外蒙氣之厚如乙寅從丁切寅作光線與丙甲線交於夘則月行所當地影半徑為己辰而己辰之分必尤大於己辛矣此辛辰之分當辛甲辰角約為甲辛乙角六十九分之一故又以此為影差與實影半徑己甲辛角相加得己甲辰角為視影半徑也求黄道高弧交角求交食方位及日食三差皆用黄道高弧交角上編月食方位求交角之法與日食三差之求交角者微有不同而畧為簡易葢各圏相交皆成弧線三角形轉換相求法可相通而理實一致彼此互相發也近日西法又以黄道赤經交角與赤經高弧交角相加減而得黄道高弧交角用以求月食方位繁簡大槪相同而用以求日食三差則甚為省便葢黄道隨天西轉其象時時不同而黄道赤經交角無異不須逐時推算也因著其法於左如圖甲為天頂甲乙丙為子午圏乙丙為地平丁為赤極戊己庚為赤道辛為黄極壬癸子丑為黄道己為春分丑為黄道交西地平之㸃壬為黄平象限距丑九十度癸為正午壬癸為黄平象限距正午之度壬寅為黄平象限距地平之度即丑角度子為太隂實行經度日食即為太陽經度月食為太陽對衝地影之經度子已為太隂距春分後之經度子壬為太隂距黄平象限之度甲子夘為高弧丁子辰為赤道經圈辰巳為赤道同升度戊辰為太陰距正午赤道度日食即太陽距午正赤道度月食為太陽距子正赤道度丑子夘角為黄道高弧交角求之之法先用戊己弧求癸己癸戊二弧及癸角次求癸丑弧及丑角以求子角者日食三差之法也先用己庚弧求己丑弧及丑角以求子角者月食方位之法也今按己子辰角即黄道赤經交角甲子丁角與辰子夘角為對角即赤經高弧交角兩角相減即得丑子夘黄道高弧交角夫黄道交地平之丑角時時不同而己子辰黄道赤經交角則初虧與復圓無異然則先求得黄道赤經交角至求黄道高弧交角則惟求一赤經高弧交角與之加減而己其加減之法以太陰在夏至前後各六宫與距正午之東西為定試以甲為天頂作乙庚丙己地平圏乙甲丙為子午經圏庚甲己為東西經圏庚戊己為赤道丑己未為黄道己為春分當黄平象限丑為冬至當西地平未為夏至當東地平是為夏至前六宫在地平上癸為黄道當正午之度己癸為黄平象限距午東之度設太隂子㸃在正午之西甲子夘為高弧丁辰子為過赤極經圏己子辰角為黄道赤經交角甲子丁角為赤經高弧交角丑子夘角為黄道高弧交角與甲子癸角等是以甲子丁赤經高弧交角與己子辰黄道赤經交角相減餘甲子癸角即黄道高弧交角也設太隂申㸃在正午之東甲申酉為高弧丁申戌為過赤極經圏巳申戌角為黄道赤經交角與丁申未角等甲申丁角為赤經高弧交角酉申未角為黄道高弧交角乃甲申未角之外角是以甲申丁赤經高弧交角與丁申未黄道赤經交角相加得甲申未角與半周相減餘酉申未角即黄道高弧交角也若己為秋分當黄平象限未為夏至當西地平丑為冬至當東地平是為夏至後六宫在地平上癸為黄道當正午之度己癸為黄平象限距午西之度設太隂子㸃在正午之西甲子夘為高弧丁子辰為過赤極經圏己子辰角為黄道赤經交角與丁子未角等甲子丁角為赤經高弧交角夘子未角為黄道高弧交角乃甲子未角之外角是以甲子丁赤經高弧交角與丁子未黄道赤經交角相加得甲子未角與半周相減餘夘子未角即黄道高弧交角也設太隂申㸃在正午之東甲申酉為高弧丁戌申為過赤極經圏己申戌角為黄道赤經交角甲申丁角為赤經高弧交角丑申酉角為黄道高弧交角與甲申癸角等是以甲申丁赤經高弧交角與己申戌黄道赤經交角相減餘甲申癸角即黄道高弧交角也此太隂在午東而亦在限東太隂在午西而亦在限西之常法也若太隂在夏至前六宫而在正午之東如乾以己乾亥黄道赤經交角與甲乾丁赤經高弧交角相加得己乾甲角不足九十度與酉乾丑角等則不與半周相減即以酉乾丑角為黄道高弧交角乃知太隂乾㸃在黄平象限巳㸃之西也葢惟正當黄平象限高弧與黄道成直角在限西者則高弧與限西之黄道成銳角在限東者則高弧與限東之黄道成銳角今己乾甲角既不及九十度故知乾㸃在黄平象限己㸃之西而乾酉高弧乃與限西之乾丑黄道相交成銳角也太隂在午西而在限東者倣此左圖以二至當地平乃黄平象限偏午東午西之極大者如二分當地平則黄平象限當正午加減之法並同至求赤經高弧交角之法則以北極距天頂為一邊影距北極為一邊影距正午赤道度日食則為日距正午赤道度為所夾之角用弧三角法算之如太隂在申甲申丁三角形申角為赤經高弧交角甲丁為北極距天頂申丁為影距北極丁角當戊戌弧為影距正午赤道度因丁角為銳角則自天頂甲作甲坎垂弧於形内使坎角成直角求得甲坎丁坎二邊以丁坎與丁申相減即得坎申邊用之與甲坎邊求申角也如太隂在艮甲丁艮角當戊己弧適足九十度成直角則甲丁即為垂弧即用甲丁艮正弧三角形以求艮角也如太隂在震甲丁震角當戊巽弧過於九十度成鈍角則自天頂甲作甲離垂弧於形外使離角成直角求得甲離離丁二邊以離丁與丁震相加即得離震邊用之與甲離邊求震角也又如黄道在天頂北太隂在坤甲坤丁赤經高弧交角大於九十度則自天頂甲作垂弧至兊而所求之丁兊距極分邊反大於丁坤影距北極則以坤兌甲兌二邊求坤角之外角即知甲坤丁角為鈍角也若所求距極分邊與影距北極等即知赤經高弧交角為直角不待求也至於赤經高弧交角有與黄道赤經交角相等者亦有與黄道赤經交角共為一百八十度者有反大于黄道赤經交角而不足減者亦有與黄道赤經交角相加大于半周而又減去半周者如北極出地二十三度二十九分以下夏至前後黄道正當天頂太隂子㸃在夏至未㸃之前而在正午之西當以赤經高弧交角與黄道赤經交角相減為黄道高弧交角今甲子丁赤經高弧交角與己子辰黄道赤經交角相等兩角相減無餘即知黄道與高弧合無交角也又如太隂申㸃在夏至未㸃之前而在正午之東當以赤經高弧交角與黄道赤經交角相加為黄道高弧交角今甲申丁赤經高弧交角與巳申戌黄道赤經交角相加共一百八十度亦如黄道與高弧合無交角也又如北極出地在二十三度以下夏至前後黄道在天頂北太隂子㸃在夏至未㸃之前而在正午之西當於黄道赤經交角内減赤經高弧交角為黄道高弧交角今甲子丁赤經高弧交角與辰子夘角等反大於巳子辰黄道赤經交角則於辰子夘赤經高弧交角内反減巳子辰黄道赤經交角餘巳子夘角為黄道高弧交角即知黄平象限在天頂北也又如太隂申㸃在夏至未㸃之前而在正午之東當以赤經高弧交角與黄道赤經交角相加為黄道高弧交角今甲申丁赤經高弧交角與戌申酉角等與巳申戌黄道赤經交角相加大於一百八十度則減去巳申戌角及戌申未角共一百八十度餘未申酉角為黄道高弧交角亦如黄平象限在天頂北也總之黄道出入於赤道之内外隨天左旋其高低斜正旣隨時不同又以人所居之南北異地改觀益多變換然定之以數自無遁形或從地平立算或從子午圈立算或從赤道經圈立算法雖不同理實一致合而觀之益見弧線三角之用至通變矣求月食初虧復圓併徑黄道交角即緯差角定月食方位月當黄道無距緯即用黄道高弧交角為定交角若月在交前後有距緯則又求緯差角與黄道高弧交角相加減為定交角上編言之詳矣見月食方位篇然求緯差角之法必先用初虧復圓交周各求距緯今初虧復圓距弧皆斜距之度須復以斜距與白道為比例方得交周頗為費算且前已有斜距黄道交角與九十度相加減即黄道交實緯角則求得併徑交實緯