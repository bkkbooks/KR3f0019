時相去不逺故借近時之圖以明之因即以併徑立算故質名之曰併徑高弧交角不必又求緯差角與黄道高弧交角相加減而後為定交角也復圓倣此求日食帶食推日食帶食法舊以初虧復圓距時之視行帶食在食甚前用初虧視行帶食在食甚後用復圓視行與日出入距食甚之時分即帯食距時為比例得日出入距食甚之視行即帶食距弧而後與食甚視緯求其兩心視相距下編仍之今推食甚先求兩心視相距而後求視行初虧復圓止求兩心視相距更不求視行則帶食亦可逕求兩心視相距不待先求視行矣且舊法推視行雖不見初虧食甚或不見食甚復圓皆猶多此一算今逕求兩心視相距則以地平為斷凡己初虧而帶出者止求帶出時之相距不用求初虧視行未復圓而帶入者止求帶入時之相距不用求復圓視行若己過食甚而帶出者即以帯食視緯求復圓用時未及食甚而帶入者即以帯食視緯求初虧用時固不用求視行亦不用求食甚其法甚為省便况視行不與白道平行帶食之視緯必不與食甚等則逕求帶食兩心視相距而不用視行者其理尤為確凖也如雍正九年辛亥十二月庚寅朔日食帯食食甚用時辰正二刻一分五十一秒一六日出辰初一刻九分二十九秒二三在用時前四刻七分二十一秒九三以一小時兩經斜距三十三分一十秒二三為比例得甲乙三十七分一十四秒五四為帶食距弧甲為用時月影心乙為帯食月影心乾甲為用時兩心實相距四十三分三十七秒八甲乾乙角為帯食對距弧角四十度二十九分二秒二八乾乙為帯食兩心實相距五十七分二十一秒八一坎乾甲角為赤白二經交角八度四十分五十秒六八本時日在冬至後黄經在赤經西月在正交後白經又在黄經西故白經更在赤經西坎乾丙角為日出時赤經高弧交角四十五度四十分四十八秒三八赤經在高弧東内減坎乾甲角餘甲乾丙角三十六度五十九分五十七秒七為日出時白經高弧交角赤經在高弧東白經在赤經西故以赤白二經交角與赤經高弧交角相減餘為白經高弧交角與甲乾乙對距弧角相減餘乙乾丙角三度二十九分四秒五八為帯食對兩心視相距角丙為帶食日影心丙乾為地平高下差五十九分二十秒二一用乾乙丙三角形求得丙角五十九度一十一分一十七秒四七為帯食對兩心實相距角即帯食方位角與半周相減餘乙丙丁角一百二十度四十九分為帯食視距高弧交角方位角止用度分故不計秒丁為上乾為下帯食方位為右偏下又求得乙丙邉四分三秒五七為帯食兩心視相距與日月實併徑三十二分二十一秒四四相減餘二十八分一十七秒八七以日全徑三十二分四十六秒作十分為比例得八分三十八秒一七即帯食分秒也又法以甲乾丙白經高弧交角及丙乾高下差求得戊丙東西差三十五分四十二秒五六與甲己等乾戊南北差四十七分二十三秒三三以乾甲實緯與乾戊南北差相減餘戊甲三分四十五秒五三與丙己等為帶食視緯以甲己東西差與甲乙帶食距弧相減餘乙己一分三十一秒九八為帶食視距弧用乙丙己勾股形求得乙丙弦四分三秒五七為帶食兩心視相距與前所得數同又以丙己與乙己之比同於半徑一千萬與丙角正切線之比而得丙角二十二度一十一分一十五秒與乾丙己白經高弧交角相加乾丙己角與甲乾丙角等得乙丙乾角五十九度一十一分與半周相減餘乙丙丁角一百二十度四十九分為帶食視距高弧交角亦與前所得數同此乙丙視距未與視行成直角甲乙雖非視行然相去不逺帶食在食甚前必按求食甚真時之法求得真時兩心視相距再求復圓用時如帶食在食甚後者則不用求食甚即以丙己帶食視緯為勾丙庚併徑為弦求得己庚股與乙己帶食視距弧相加得乙庚為復圓距弧甲乙帶食距弧大於東西差乙庚大於己庚故加若甲乙帶食距弧小於東西差而乙庚小於己庚則減以一小時兩經斜距為比例卽得復圓距時與日出時刻相加即得復圓用時也帶食出地復圓在日出後故加若帶食入地初虧在日入前則減帶食入地者倣此御製歴象考成後編卷三
