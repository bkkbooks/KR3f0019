body:
  text: 日躔步法推日躔用數推日躔法月離步法推月離用數推月離法用表推月離法推日躔用數雍正元年癸卯天正冬至為元周天三百六十度入算化作一百二十九萬六千秒周日一萬分周歲三百六十五日二四二三三四四二紀法六十宿法二十八太陽每日平行三千五百四十八秒小餘三二九八九七太陽每日平行五十九分零八秒一十九微四十四纖四十三忽二十二芒以秒法通之即得最卑每歲平行六十二秒小餘九九七五最卑每歲平行一分二秒五十九微五十一纖零八忽以秒法通之即得最卑每日平行十分秒之一又七二四八最卑每日平行十微二十纖五十六忽以秒法通之即得太陽本天大半徑一千萬小半徑九百九十九萬八千五百七十一小餘八五兩心差十六萬九千氣應三十二日一二二五四氣應者癸卯年天正平冬至距甲子日子正初刻之日分乃丙申日丑正三刻十一分有奇也按下編康熙二十三年甲子氣應為七日六五六三七四九二六依法以求癸卯年天正冬至則得三十二日一一六八七四今所定氣應遲百分日之二又八五二六於時差二刻於經度差一分十四秒而緯度則無差也蓋算家推測惟憑春秋分而推測之法則以所測之視髙度減蒙氣差加地半徑差而得太陽之實髙度然後以距緯求其經度而得節氣時刻焉上編謂春秋分太陽髙五十度無蒙氣差而加地半徑差一分五十六秒今法謂地半徑差甚微可以不計而減蒙氣差五十秒故所測視髙度雖同而所推實髙度恆低二分四十六秒則經度必差六分五十八秒春分日道自南而北時刻必差而遲秋分日道自北而南時刻必差而早故春分均數少加六分五十八秒秋分均數少減六分五十八秒則所推與所測合矣然今所測之視髙度春分又比前低二十七秒秋分又比前髙二十七秒則經度又差一分十四秒時刻皆差而遲故定氣應遲二刻則經度即減一分十四秒緯度即差二十七秒而春秋分之視髙乃與實測吻合也宿應二十七日一二二五四宿應者癸卯年天正平冬至距角宿值日子正初刻之日分乃軫宿值日丑正三刻十一分有奇也最卑應八度七分三十二秒二十二微最卑應者癸卯年天正平冬至次日子正初刻最卑過冬至之度分也按下編甲子年最卑應為七度一十分一十一秒一十微依法以求癸卯年最卑應則得七度四十九分五十六秒四十微今所定最卑應多十七分三十五秒四十二微蓋既改定均數則春分以加少而遲秋分以減少而早與實測合矣然逐節氣測之春分前之所遲秋分前之所早者較多春分後之所遲秋分後之所早者較少故定最卑應多十七分有奇則引數即少十七分有奇春分前加均以漸而多引數少則加者少故遲者遂多春分後加均以漸而少引數少則加者多故遲者遂少秋分前減均以漸而多引數少則減者少故早者遂多秋分後減均以漸而少引數少則減者多故早者遂少而春秋分之前後乃皆與實測吻合也推日躔法求積年自雍正元年癸卯距所求之年共若干年減一年得積年求中積分以積年與歲實三百六十五日二四二三三四四二相乘得中積分求通積分置中積分加氣應三十二日一二二五四得通積分上考往古則置中積分減氣應得通積分求天正冬至置通積分其日滿紀法六十去之餘為天正冬至日分上考往古則以所餘轉與紀法六十相減餘為天正冬至日分自初日甲子起算得天正冬至干支以一千四百四十分通其小餘得天正冬至時分秒求年根以周日一萬分為一率太陽每日平行三千五百四十八秒三二九八九七為二率以天正冬至分不用日與周日一萬分相減餘為三率求得四率為秒以分收之得年根求紀日以天正冬至干支加一日得紀日求值宿置中積分加宿應二十七日一二二五四為通積宿其日滿宿法二十八去之外加一日為值宿日分上考往古則置中積分減宿應為通積宿其日滿宿法二十八去之餘數轉與宿法二十八相減外加一日為值宿日分自初日角宿起算得值宿求日數自天正冬至次日距所求本日共若干日與太陽每日平行三千五百四十八秒三二九八九七相乘得數為秒以宫度分收之得日數求平行以年根與日數相加得平行求最卑平行以積年與最卑每歲平行六十二秒九九七五相乘得積年之行又以日數與最卑每日平行十分秒之一又七二四八相乘得日數之行兩數相併與最卑應八度七分三十二秒二十二微相加得最卑平行上考往古則置最卑應減積年之行加日數之行得最卑平行求引數置平行減最卑平行得引數求均數以二千萬為一邊倍兩心差三三八為一邊引數為所夾之角六宫內引數即為所夾之角六宫外引數與全周相減餘為所夾之角用切線分外角法求得對倍兩心差之角倍之為撱圓界角又以撱圓小半徑九九九八五七一小餘八五為一率大半徑一千萬為二率引數即前所夾之角之正切為三率求得四率為撱圓之正切檢表得度分秒與引數相減餘為撱圓差角最卑前後各三宫與撱圓界角相加最髙前後各三宫與撱圓界角相減一二宫為最卑後九十十一宫為最卑前三四五宫為最髙前六七八宫為最髙後得均數引數初宫至五宫為加六宫至十一宫為減求實行置平行加減均數得實行求宿度以積年與歲差五十一秒相乘得數與癸卯年黃道宿鈐相加得本年宿鈐察實行足減某宿度分則減之餘為某宿度分右法除均數外餘俱與下編同但用數小異耳至用表推算之法則全與下編同故不復載推月離用數雍正元年癸卯天正冬至為元周天三百六十度入算化作一百二十九萬六千秒周日一萬分周歲三百六十五日二四二三三四四二紀法六十太陰每日平行四萬七千四百三十五秒小